plugins {
    id "com.android.application"
    id "so.onekey.plugin.security"
}
apply plugin: "com.facebook.react"

apply plugin: 'com.google.gms.google-services'

apply plugin: "io.sentry.android.gradle"

def projectRoot = rootDir.getAbsoluteFile().getParentFile().getAbsolutePath()

sentry {
    // Enables or disables the automatic configuration of Native Symbols
    // for Sentry. This executes sentry-cli automatically so
    // you don't need to do it manually.
    // Default is disabled.
    uploadNativeSymbols = false

    // Enables or disables the automatic upload of the app's native source code to Sentry.
    // This executes sentry-cli with the --include-sources param automatically so
    // you don't need to do it manually.
    // This option has an effect only when [uploadNativeSymbols] is enabled.
    // Default is disabled.
    includeNativeSources = true

    // `@sentry/react-native` ships with compatible `sentry-android`
    // This option would install the latest version that ships with the SDK or SAGP (Sentry Android Gradle Plugin)
    // which might be incompatible with the React Native SDK
    // Enable auto-installation of Sentry components (sentry-android SDK and okhttp, timber and fragment integrations).
    // Default is enabled.
    autoInstallation {
      enabled = false
    }
}

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    entryFile = file(["node", "-e", "require('expo/scripts/resolveAppEntry')", projectRoot, "android", "absolute"].execute(null, rootDir).text.trim())
    reactNativeDir = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()
    hermesCommand = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsolutePath() + "/sdks/hermesc/%OS-BIN%/hermesc"
    codegenDir = new File(["node", "--print", "require.resolve('@react-native/codegen/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()
    enableBundleCompression = (findProperty('android.enableBundleCompression') ?: false).toBoolean()

    // Use Expo CLI to bundle the app, this ensures the Metro config
    // works correctly with Expo projects.
    cliFile = new File(["node", "--print", "require.resolve('@expo/cli')"].execute(null, rootDir).text.trim())
    bundleCommand = "export:embed"

    /* Folders */
    // The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    debuggableVariants = ["debug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]

    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = (findProperty('android.enableProguardInReleaseBuilds') ?: false).toBoolean()

/**
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
// def jscFlavor = 'org.webkit:android-jsc:+'
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

static def defEnvStr(config, key, defValue = "0") {
    def value = config.getProperty(key)
    if (value == null || value.isEmpty()) {
        def envParam = System.getenv();
        value = envParam.get(key)
    }
    return value ? value : defValue
}

static def readRootEnvFile(fileName = ".env") {
    // base file path: packages/expo/android/
    def rootEnvPath = './../../../'

    def props = new Properties()
    try {
        new File(rootEnvPath + File.separator + fileName).withInputStream {
            stream -> props.load(stream)
        }
    } catch (ignore) {
        // ignore
    }

    return props
}

apply from: new File(["node", "--print", "require.resolve('@sentry/react-native/package.json')"].execute().text.trim(), "../sentry.gradle")
android {
    ndkVersion rootProject.ext.ndkVersion

    compileSdk rootProject.ext.compileSdkVersion

    namespace 'so.onekey.app.wallet'
    defaultConfig {
        applicationId 'so.onekey.app.wallet'
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"

        // Detox uses Espresso and requires AndroidJUnitRunner (or a subclass).
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        // buildConfigField("boolean", "REACT_NATIVE_UNSTABLE_USE_RUNTIME_SCHEDULER_ALWAYS", (findProperty("reactNative.unstable_useRuntimeSchedulerAlways") ?: true).toString())
        buildConfigField("boolean", "NO_FLIPPER", 'true')
        buildConfigField("String", "ANDROID_CHANNEL", "\"" + (System.getenv('ANDROID_CHANNEL') ?: 'direct') + "\"")
        def appEnvConfig = readRootEnvFile()
        // CI writes BUNDLE_VERSION to .env.expo, merge it into appEnvConfig
        def expoEnvConfig = readRootEnvFile('.env.expo')
        expoEnvConfig.each { key, value ->
            if (value && !value.toString().isEmpty()) {
                appEnvConfig.setProperty(key.toString(), value.toString())
            }
        }
        buildConfigField(
            "boolean",
            "ENABLE_NATIVE_BACKGROUND_THREAD",
            defEnvStr(appEnvConfig, 'ENABLE_NATIVE_BACKGROUND_THREAD', 'false').toLowerCase()
        )
        // ONEKEY_STARTUP_PROFILE — single env-var flag enabling native HBC + segment
        // timing + JS module profile. See .skillshare/skills/1k-startup-profile/skill.md
        buildConfigField(
            "boolean",
            "ONEKEY_STARTUP_PROFILE",
            (System.getenv('ONEKEY_STARTUP_PROFILE')?.toLowerCase() in ['1', 'true', 'yes', 'on']).toString()
        )
        missingDimensionStrategy 'abi', 'x86', 'x86_64'
        missingDimensionStrategy 'react-native-capture-protection', 'fullMediaCapture'
        manifestPlaceholders = [
            JPUSH_APPKEY    : defEnvStr(appEnvConfig, 'JPUSH_KEY'),
            JPUSH_CHANNEL   : 'prod',
            BUILTIN_BUNDLE_VERSION: defEnvStr(appEnvConfig, 'BUNDLE_VERSION'),
        ]
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            resValue "string", "app_name", "OneKey Dev"
            signingConfig signingConfigs.debug
            ndk {
                def architectures = project.getProperties().get("reactNativeArchitectures")
                if (architectures) {
                    abiFilters(*architectures.split(","))
                } else {
                    abiFilters "arm64-v8a", "x86_64"
                }
            }
        }
        release {
            resValue "string", "app_name", "OneKey"
            // Caution! In production, you need to generate your own keystore file.
            // see https://reactnative.dev/docs/signed-apk-android.
            signingConfig signingConfigs.debug
            shrinkResources (findProperty('android.enableShrinkResourcesInReleaseBuilds')?.toBoolean() ?: false)
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            crunchPngs (findProperty('android.enablePngCrunchInReleaseBuilds')?.toBoolean() ?: true)
            ndk {
                abiFilters "arm64-v8a"
            }
        }
    }
    flavorDimensions "dimension"
    productFlavors {
    	google {
    		dimension "dimension"
    	}
    	prod {
            isDefault true
    		dimension "dimension"
    	}
    }
    packagingOptions {
        exclude 'META-INF/DEPENDENCIES'
        exclude 'META-INF/INDEX.LIST'
    }
    androidResources {
        ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:!CVS:!thumbs.db:!picasa.ini:!*~'
        // Keep .hbc segment files uncompressed so AssetFileDescriptor.getLength()
        // works without full-stream reads (#38).
        noCompress '.hbc'
    }

    // @onekeyfe/react-native-app-update: replace with noop stub for non-prod flavors
    applicationVariants.configureEach { variant ->
        if (variant.flavorName != "prod") {
            variant.compileConfiguration.resolutionStrategy.dependencySubstitution {
                substitute project(':onekeyfe_react-native-app-update') using project(':app-update-noop')
            }
            variant.runtimeConfiguration.resolutionStrategy.dependencySubstitution {
                substitute project(':onekeyfe_react-native-app-update') using project(':app-update-noop')
            }
        }
    }
}

static def capitalizeVariantName(String variantName) {
    return variantName.substring(0, 1).toUpperCase() + variantName.substring(1)
}

def registerBackgroundReleaseBundleTask(variant, appProjectRootDir) {
    if (!variant.buildType?.name?.equalsIgnoreCase("release")) {
        return
    }

    def variantName = variant.name
    def targetName = capitalizeVariantName(variantName)
    def mainBundleTaskName = "createBundle${targetName}JsAndAssets"
    def backgroundBundleTaskName = "createBackgroundBundle${targetName}JsAndAssets"
    def syncBackgroundBundleTaskName = "syncBackgroundBundle${targetName}Assets"
    def mergeAssetsTaskName = "merge${targetName}Assets"
    def compressAssetsTaskName = "compress${targetName}Assets"
    def injectSentryAssetsTaskName = "injectSentryDebugMetaPropertiesIntoAssets${targetName}"

    def mainBundleAssetsDir = file("$buildDir/generated/assets/${mainBundleTaskName}")
    def mainBundleResourcesDir = file("$buildDir/generated/res/${mainBundleTaskName}")
    def reactBackgroundSourceMapsDir = file("$buildDir/generated/sourcemaps/react-background/${variantName}")
    def backgroundBundleOutputFile = file("$buildDir/generated/assets/${mainBundleTaskName}/background.bundle")
    def backgroundBundleSourceMapFile = file("$buildDir/generated/sourcemaps/react-background/${variantName}/background.bundle.map")
    def mergedAssetsDir = file("$buildDir/intermediates/assets/${variantName}/${mergeAssetsTaskName}")
    def sentryInjectedAssetsDir = file("$buildDir/intermediates/assets/${variantName}/${injectSentryAssetsTaskName}")

    def backgroundBundleTask = tasks.register(backgroundBundleTaskName, Exec) {
        dependsOn(tasks.named(mainBundleTaskName))
        workingDir appProjectRootDir

        doFirst {
            mainBundleAssetsDir.mkdirs()
            mainBundleResourcesDir.mkdirs()
            reactBackgroundSourceMapsDir.mkdirs()
        }

        commandLine(
            "node",
            "scripts/build-release-background-bundle.js",
            "--platform",
            "android",
            "--entry-file",
            "background.ts",
            "--bundle-output",
            backgroundBundleOutputFile.absolutePath,
            "--assets-dest",
            mainBundleResourcesDir.absolutePath,
            "--sourcemap-output",
            backgroundBundleSourceMapFile.absolutePath,
        )
    }

    // Segment HBC files are compiled by build-release-background-bundle.js
    // and placed alongside the bundle in mainBundleAssetsDir (segments/ and
    // segments-background/ subdirectories). They are included in APK assets
    // automatically by the merge task.
    def mainSegmentsOutputDir = file("$buildDir/generated/assets/${mainBundleTaskName}/segments")
    def bgSegmentsOutputDir = file("$buildDir/generated/assets/${mainBundleTaskName}/segments-background")

    tasks.named("merge${targetName}Assets").configure {
        dependsOn(backgroundBundleTask)
    }
    tasks.named("merge${targetName}Resources").configure {
        dependsOn(backgroundBundleTask)
    }

    def syncBackgroundBundleTask = tasks.register(syncBackgroundBundleTaskName) {
        dependsOn(backgroundBundleTask)
        dependsOn(tasks.named(mergeAssetsTaskName))

        doLast {
            copy {
                from(backgroundBundleOutputFile)
                into(mergedAssetsDir)
            }
            // Copy segment directories into merged assets
            if (mainSegmentsOutputDir.exists()) {
                copy {
                    from(mainSegmentsOutputDir)
                    into(file("${mergedAssetsDir}/segments"))
                }
            }
            if (bgSegmentsOutputDir.exists()) {
                copy {
                    from(bgSegmentsOutputDir)
                    into(file("${mergedAssetsDir}/segments-background"))
                }
            }
            sentryInjectedAssetsDir.mkdirs()
            copy {
                from(backgroundBundleOutputFile)
                into(sentryInjectedAssetsDir)
            }
            if (mainSegmentsOutputDir.exists()) {
                copy {
                    from(mainSegmentsOutputDir)
                    into(file("${sentryInjectedAssetsDir}/segments"))
                }
            }
            if (bgSegmentsOutputDir.exists()) {
                copy {
                    from(bgSegmentsOutputDir)
                    into(file("${sentryInjectedAssetsDir}/segments-background"))
                }
            }
        }
    }

    tasks.matching { it.name == injectSentryAssetsTaskName }.configureEach {
        dependsOn(syncBackgroundBundleTask)
    }
    tasks.named(compressAssetsTaskName).configure {
        dependsOn(syncBackgroundBundleTask)
    }
}

def backgroundBundleProjectRootDir = new File(projectRoot)
def useUnionBuild = System.getenv("UNION_BUILD") == "true"

android.applicationVariants.configureEach { variant ->
    if (useUnionBuild) {
        registerUnionBuildTask(variant, backgroundBundleProjectRootDir)
    } else {
        registerBackgroundReleaseBundleTask(variant, backgroundBundleProjectRootDir)
    }
}

/**
 * When UNION_BUILD=true, replace the standard two-step bundling
 * (separate main + background Metro processes) with a single union
 * build that shares module IDs and dependency graphs across runtimes.
 *
 * This runs `node build-bundle.js --platform android` which calls
 * scripts/unionBuild.js under the hood, producing:
 *   - common.bundle  (shared polyfills + modules)
 *   - main.jsbundle.hbc    (main-only modules)
 *   - background.bundle    (background-only modules)
 *   - segments/             (main-runtime segments)
 *   - segments-background/  (background-runtime segments)
 *
 * The outputs are then copied into Gradle's expected asset directories
 * so the APK packaging picks them up.
 */
def registerUnionBuildTask(variant, appProjectRootDir) {
    if (!variant.buildType?.name?.equalsIgnoreCase("release")) {
        return
    }

    def variantName = variant.name
    def targetName = capitalizeVariantName(variantName)
    def mainBundleTaskName = "createBundle${targetName}JsAndAssets"
    def mergeAssetsTaskName = "merge${targetName}Assets"
    def compressAssetsTaskName = "compress${targetName}Assets"
    def injectSentryAssetsTaskName = "injectSentryDebugMetaPropertiesIntoAssets${targetName}"

    def mainBundleAssetsDir = file("$buildDir/generated/assets/${mainBundleTaskName}")
    def mergedAssetsDir = file("$buildDir/intermediates/assets/${variantName}/${mergeAssetsTaskName}")
    def sentryInjectedAssetsDir = file("$buildDir/intermediates/assets/${variantName}/${injectSentryAssetsTaskName}")

    // Union build output directory (build-bundle.js writes here)
    def unionOutputDir = file("${appProjectRootDir}/out-dir-bundle/android/dist")

    def unionBuildTaskName = "unionBuild${targetName}JsBundle"
    def unionBuildTask = tasks.register(unionBuildTaskName, Exec) {
        // The union build replaces BOTH the main bundle task and the
        // background bundle task, so it must run after the main task
        // completes (the main task is still needed for Hermes/codegen
        // but we overwrite its JS output).
        dependsOn(tasks.named(mainBundleTaskName))
        workingDir appProjectRootDir

        doFirst {
            // Clean previous union output
            delete unionOutputDir
        }

        commandLine(
            "node",
            "--max-old-space-size=8192",
            "build-bundle.js",
            "--platform",
            "android",
        )

        environment "NODE_ENV", "production"
        environment "SENTRY_DISABLE_AUTO_UPLOAD", "true"
    }

    def syncUnionBuildTaskName = "syncUnionBuild${targetName}Assets"
    def syncUnionBuildTask = tasks.register(syncUnionBuildTaskName) {
        dependsOn(unionBuildTask)
        dependsOn(tasks.named(mergeAssetsTaskName))

        doLast {
            // Copy union build output into Gradle's generated assets dir
            // (overwriting what the standard bundle task produced)

            // common.bundle (shared polyfills + modules, loaded first)
            def commonBundle = file("${unionOutputDir}/common.bundle")
            if (commonBundle.exists()) {
                copy {
                    from commonBundle
                    into mainBundleAssetsDir
                }
            }

            // index.android.bundle (main-only modules)
            def mainBundle = file("${unionOutputDir}/main.jsbundle.hbc")
            if (mainBundle.exists()) {
                copy {
                    from mainBundle
                    into mainBundleAssetsDir
                    rename { "index.android.bundle" }
                }
            }

            // background.bundle
            def bgBundle = file("${unionOutputDir}/background.bundle")
            if (bgBundle.exists()) {
                copy {
                    from bgBundle
                    into mainBundleAssetsDir
                }
            }

            // segments/ and segments-background/
            def segmentsDir = file("${unionOutputDir}/segments")
            if (segmentsDir.exists()) {
                copy {
                    from segmentsDir
                    into file("${mainBundleAssetsDir}/segments")
                }
            }
            def segmentsBgDir = file("${unionOutputDir}/segments-background")
            if (segmentsBgDir.exists()) {
                copy {
                    from segmentsBgDir
                    into file("${mainBundleAssetsDir}/segments-background")
                }
            }

            // module-id-map.json — maps numeric Metro moduleIds back to source
            // file paths so a runtime "Requiring unknown module" crash can be
            // diagnosed straight from the installed APK.
            def moduleIdMap = file("${unionOutputDir}/module-id-map.json")
            if (moduleIdMap.exists()) {
                copy {
                    from moduleIdMap
                    into mainBundleAssetsDir
                }
            }

            // Also sync into merged assets and Sentry-injected assets dirs
            // so downstream tasks see the correct bundles.
            [mergedAssetsDir, sentryInjectedAssetsDir].each { destDir ->
                destDir.mkdirs()
                if (commonBundle.exists()) {
                    copy { from commonBundle; into destDir }
                }
                if (mainBundle.exists()) {
                    copy { from mainBundle; into destDir; rename { "index.android.bundle" } }
                }
                if (bgBundle.exists()) {
                    copy { from bgBundle; into destDir }
                }
                if (segmentsDir.exists()) {
                    copy { from segmentsDir; into file("${destDir}/segments") }
                }
                if (segmentsBgDir.exists()) {
                    copy { from segmentsBgDir; into file("${destDir}/segments-background") }
                }
                if (moduleIdMap.exists()) {
                    copy { from moduleIdMap; into destDir }
                }
            }
        }
    }

    // Wire the union build into the Gradle lifecycle
    tasks.matching { it.name == injectSentryAssetsTaskName }.configureEach {
        dependsOn(syncUnionBuildTask)
    }
    tasks.named(compressAssetsTaskName).configure {
        dependsOn(syncUnionBuildTask)
    }
}

// Apply static values from `gradle.properties` to the `android.packagingOptions`
// Accepts values in comma delimited lists, example:
// android.packagingOptions.pickFirsts=/LICENSE,**/picasa.ini
["pickFirsts", "excludes", "merges", "doNotStrip"].each { prop ->
    // Split option: 'foo,bar' -> ['foo', 'bar']
    def options = (findProperty("android.packagingOptions.$prop") ?: "").split(",");
    // Trim all elements in place.
    for (i in 0..<options.size()) options[i] = options[i].trim();
    // `[] - ""` is essentially `[""].filter(Boolean)` removing all empty strings.
    options -= ""

    if (options.length > 0) {
        println "android.packagingOptions.$prop += $options ($options.length)"
        // Ex: android.packagingOptions.pickFirsts += '**/SCCS/**'
        options.each {
            android.packagingOptions[prop] += it
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    // MMKV — used by RecoveryActivity to clear pending install tasks
    implementation("io.github.zhongwuzw:mmkv:2.2.4")

    // AndroidX Core SplashScreen - fixes MIUI/HyperOS splash screen crashes
    implementation("androidx.core:core-splashscreen:1.2.0-alpha02")

    def isGifEnabled = (findProperty('expo.gif.enabled') ?: "") == "true";
    def isWebpEnabled = (findProperty('expo.webp.enabled') ?: "") == "true";
    def isWebpAnimatedEnabled = (findProperty('expo.webp.animated') ?: "") == "true";
    // def frescoVersion = rootProject.ext.frescoVersion
    // def noFlipper = System.getenv('NO_FLIPPER') == '1'

    // If your app supports Android versions before Ice Cream Sandwich (API level 14)
    if (isGifEnabled || isWebpEnabled) {
        implementation("com.facebook.fresco:fresco:${expoLibs.versions.fresco.get()}")
        implementation("com.facebook.fresco:imagepipeline-okhttp3:${expoLibs.versions.fresco.get()}")
    }

    if (isGifEnabled) {
        // For animated gif support
        implementation("com.facebook.fresco:animated-gif:${expoLibs.versions.fresco.get()}")
    }

    if (isWebpEnabled) {
        // For webp support
        implementation("com.facebook.fresco:webpsupport:${expoLibs.versions.fresco.get()}")
        if (isWebpAnimatedEnabled) {
            // Animated webp support
            implementation("com.facebook.fresco:animated-webp:${expoLibs.versions.fresco.get()}")
        }
    }

    // if (!noFlipper) {
    //     implementation("com.facebook.react:flipper-integration")
    // }

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // Google Play Services
    implementation("com.google.android.gms:play-services-base:18.5.0")

    // EventBus
    implementation 'org.greenrobot:eventbus-java:3.3.1'

    // AndroidX Window Manager for dual-screen and foldable devices support
    implementation 'androidx.window:window:1.5.1'
    implementation 'androidx.window:window-java:1.5.1'

    // geckoview
    // implementation("org.mozilla.geckoview:geckoview:133.0.20241209150345")
    // implementation("com.google.code.gson:gson:2.13.1")

    // add billing sdk, also update AndroidManifest.xml
    // def billingVersion = 7.1.1
    // implementation("com.android.billingclient:billing:$billingVersion")

    // Detox (Android instrumentation tests)
    // Keep this pinned (no '+') to ensure reproducible builds and reduce supply-chain risk.
    // When upgrading Detox, update this to match the JS `detox` version.
    def detoxVersion = "20.46.3"
    androidTestImplementation("com.wix:detox:${detoxVersion}") { transitive = true }
    androidTestImplementation('androidx.test:runner:1.5.2')
    androidTestImplementation('androidx.test:rules:1.5.0')
    androidTestImplementation('androidx.test.ext:junit:1.1.5')

    // JPush
    googleImplementation 'cn.jiguang.sdk.plugin:fcm:5.9.0'
}

// apply from: new File(["node", "--print", "require.resolve('@react-native-community/cli-platform-android/package.json')"].execute(null, rootDir).text.trim(), "../native_modules.gradle");
// applyNativeModulesAppBuildGradle(project)
