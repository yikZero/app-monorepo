<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline';">
  <title>OneKey Recovery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0F0F0F;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      -webkit-app-region: drag;
      user-select: none;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 360px;
      width: 100%;
      -webkit-app-region: no-drag;
    }
    .logo {
      width: 64px;
      height: 64px;
      margin-bottom: 32px;
    }
    .title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      text-align: center;
    }
    .subtitle {
      font-size: 14px;
      color: #8C8C8C;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 32px;
    }
    .btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 12px;
      color: #FFFFFF;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { opacity: 0.7; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background-color: #2C2C2C; }
    .btn-primary { background-color: #44D62C; color: #000000; }
    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 16px;
    }
    .btn-link {
      background: none;
      border: none;
      color: #666666;
      font-size: 12px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .btn-link:hover { color: #999999; }
    .btn-link:disabled { color: #444444; cursor: not-allowed; }
    .version {
      font-size: 12px;
      color: #666666;
    }
    .bottom-bar .separator {
      color: #444444;
      font-size: 12px;
    }
    .error-msg {
      font-size: 12px;
      color: #FF6B6B;
      margin-top: 8px;
      text-align: center;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- OneKey App Icon -->
    <img class="logo" src="../build/static/images/icons/512x512.png" alt="OneKey" onerror="this.style.display='none'" />

    <h1 class="title" id="title">Something went wrong</h1>
    <p class="subtitle" id="subtitle">The app failed to start. You can export logs for troubleshooting, try again, or auto repair to fix the issue.</p>

    <button class="btn btn-primary" id="autoRepairBtn" onclick="handleAutoRepair()">Quick Fix</button>
    <button class="btn btn-secondary" id="tryAgainBtn" onclick="handleTryAgain()">Dismiss</button>

    <div class="error-msg" id="errorMsg"></div>
    <div class="bottom-bar">
      <span class="version" id="version"></span>
      <span class="separator" id="separator">&middot;</span>
      <button class="btn-link" id="exportLogsBtn" onclick="handleExportLogs()">Export Logs</button>
    </div>
  </div>

      'ru': {
        title: 'Небольшая проблема',
        subtitle: 'Похоже, приложение не смогло нормально запуститься. Быстрое исправление должно помочь.',
        exportLogs: 'Экспорт журналов', tryAgain: 'Не сейчас', autoRepair: 'Быстрое исправление',
        repairComplete: 'Восстановление завершено', pleaseRestart: 'Пожалуйста, откройте приложение заново', error: 'Ошибка', ok: 'OK',

        repairComplete: 'মেরামত সম্পন্ন', pleaseRestart: 'অনুগ্রহ করে অ্যাপটি পুনরায় খুলুন', error: 'ত্রুটি', ok: 'ঠিক আছে',

    // Script-to-region mapping for CJK script subtags.
    // iOS/Android use BCP 47 script subtags (Hans/Hant) for Chinese variants,
    // while our i18n keys use region codes (CN/TW/HK).
    //   - zh-Hans (iOS) / zh-Hans-CN (Android) → zh-CN (Simplified)
    //   - zh-Hant (iOS) / zh-Hant-TW (Android) → zh-Hant (Traditional, shared by TW/HK)
    // zh-TW / zh-HK share the same Traditional Chinese translations
    i18nMap['zh-TW'] = i18nMap['zh-Hant'];
    i18nMap['zh-HK'] = i18nMap['zh-Hant'];
    const scriptMap = { 'Hans': 'zh-CN', 'Hant': 'zh-Hant' };

    // Locale matching priority:
    //   1. Exact match (e.g. "zh-CN", "ja-JP", "de")
    //   2. Script subtag mapping (e.g. "zh-Hans" → "zh-CN", "zh-Hant" → "zh-Hant")
    //   3. First-last parts (e.g. "zh-Hans-CN" → "zh-CN")
    //   4. Prefix match (e.g. "fr" → "fr-FR", "ja" → "ja-JP")
    //   5. Fallback to "en"
    //
    // Electron: navigator.language returns BCP 47 tags like "zh-CN", "ja", "fr-FR".
    // Chinese typically returns "zh-CN"/"zh-TW" directly without script subtag.
    function getLocale() {
      const lang = navigator.language || 'en';
      if (i18nMap[lang]) return lang;
      const parts = lang.split('-');
      if (parts.length >= 2) {
        for (const [script, mapped] of Object.entries(scriptMap)) {
          if (parts.includes(script) && i18nMap[mapped]) return mapped;
        }
      }
      if (parts.length >= 2) {
        const twoPartKey = parts[0] + '-' + parts[parts.length - 1];
        if (i18nMap[twoPartKey]) return twoPartKey;
      }
      const code = parts[0];
      if (i18nMap[code]) return code;
      const prefixMatch = Object.keys(i18nMap).find(k => k.startsWith(code + '-'));
      if (prefixMatch) return prefixMatch;
      return 'en';
    }

    const locale = getLocale();
    const i18n = i18nMap[locale] || i18nMap['en'];

    document.getElementById('title').textContent = i18n.title;
    document.getElementById('subtitle').textContent = i18n.subtitle;
    document.getElementById('exportLogsBtn').textContent = i18n.exportLogs + ' \u203A';
    document.getElementById('tryAgainBtn').textContent = i18n.tryAgain;
    document.getElementById('autoRepairBtn').textContent = i18n.autoRepair;

    // Version display
    try {
      const ver = window.desktopApi?.appVersion || '';
      if (ver) {
        document.getElementById('version').textContent = 'v' + ver;
      } else {
        document.getElementById('separator').style.display = 'none';
      }
    } catch (_) {}

    function showError(msg) {
      document.getElementById('errorMsg').textContent = msg;
    }

    function setButtonsDisabled(disabled) {
      document.getElementById('exportLogsBtn').disabled = disabled;
      document.getElementById('tryAgainBtn').disabled = disabled;
      document.getElementById('autoRepairBtn').disabled = disabled;
    }

    async function handleExportLogs() {
      showError('');
      setButtonsDisabled(true);
      try {
        const result = await window.desktopApi?.recoveryExportLogs?.();
        if (result && result.error) {
          showError(i18n.exportError + ': ' + result.error);
        }
      } catch (e) {
        showError(i18n.exportError + ': ' + (e.message || e));
      } finally {
        setButtonsDisabled(false);
      }
    }

    async function handleTryAgain() {
      showError('');
      setButtonsDisabled(true);
      try {
        const result = await window.desktopApi?.recoveryTryAgain?.();
        if (result && result.needsManualRestart) {
          // MAS cannot relaunch — prompt user
          alert(i18n.pleaseRestart || 'Please reopen the app');
          setButtonsDisabled(false);
        }
        // Non-MAS: app.relaunch() already called, process will exit
      } catch (e) {
        showError(e.message || e);
        setButtonsDisabled(false);
      }
    }

    async function handleAutoRepair() {
      showError('');
      setButtonsDisabled(true);
      try {
        const result = await window.desktopApi?.recoveryAutoRepair?.();
        if (result && result.error) {
          showError(i18n.repairError);
          setButtonsDisabled(false);
          return;
        }
        // Show success prompt first, then restart on confirm
        alert(i18n.repairComplete);
        await window.desktopApi?.recoveryTryAgain?.();
        // If MAS (can't relaunch), show manual restart hint
        alert(i18n.pleaseRestart);
        setButtonsDisabled(false);
      } catch (e) {
        showError(i18n.repairError);
        setButtonsDisabled(false);
      }
    }
  </script>
