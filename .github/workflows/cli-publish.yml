name: publish-cli

on: workflow_dispatch

permissions:
  contents: read
  id-token: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version-info.outputs.version }}
      is_prerelease: ${{ steps.version-info.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version information
        id: version-info
        run: |
          VERSION=$(node -p "require('./apps/cli/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" =~ - ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

  publish:
    needs: get-version
    runs-on: ubuntu-latest
    name: "Publish CLI v${{ needs.get-version.outputs.version }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn

      - name: Build CLI
        run: cd apps/cli && yarn build

      - name: Verify build
        run: node apps/cli/dist/cli.js --version

      - name: Publish to NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd apps/cli
          IS_PRERELEASE="${{ needs.get-version.outputs.is_prerelease }}"
          if [ "$IS_PRERELEASE" = "true" ]; then
            npm publish --access public --dist-tag next
          else
            npm publish --access public --dist-tag latest
          fi

      - name: Summary
        env:
          CLI_VERSION: ${{ needs.get-version.outputs.version }}
        run: |
          echo "Published @onekeyfe/cli v${CLI_VERSION}"
