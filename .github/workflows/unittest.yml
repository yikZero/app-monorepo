name: 02-unittest

on:
  workflow_dispatch:
  pull_request:
    branches:
      - onekey
      - x
      - hotfix/*
      - release/*
  push:
    branches:
      - onekey
      - x

# Cancel a currently running workflow from the same PR/branch/tag
# when a new workflow is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  YARN_ENABLE_GLOBAL_CACHE: true
  JEST_SHARD_TOTAL: 3
  JEST_COVERAGE_THRESHOLD_JSON: '{"statements":10,"branches":35,"functions":10}'

permissions:
  contents: read
  packages: read

jobs:
  unittest:
    name: Unit Tests (${{ matrix.shard }}/3)
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        node-version: [24.x]
        shard: [1, 2, 3]

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
          registry-url: 'https://npm.pkg.github.com'
          check-latest: true
          scope: '@onekeyhq'

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=${{ github.workspace }}/.yarn" >> "$GITHUB_OUTPUT"

      - name: Install Dependency
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: |
          yarn install --immutable

      - name: Run Tests
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max_old_space_size=8192'
        run: |
          yarn test \
            --coverage \
            --shard=${{ matrix.shard }}/${JEST_SHARD_TOTAL} \
            --coverageDirectory=coverage/shard-${{ matrix.shard }} \
            --coverageReporters=text \
            --coverageReporters=lcov \
            --coverageReporters=json-summary \
            --coverageReporters=json \
            --coverageThreshold='{}'

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ github.sha }}-shard-${{ matrix.shard }}-of-${{ env.JEST_SHARD_TOTAL }}
          path: test-report.html

      - name: Upload Coverage Shard
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ github.sha }}-shard-${{ matrix.shard }}-of-${{ env.JEST_SHARD_TOTAL }}
          path: coverage/shard-${{ matrix.shard }}/
          if-no-files-found: error

  coverage:
    name: unittest (24.x)
    runs-on: ubuntu-24.04
    needs: unittest
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Check unit test shards
        run: |
          if [ "${{ needs.unittest.result }}" != "success" ]; then
            echo "::error::Unit test shard matrix result: ${{ needs.unittest.result }}"
            exit 1
          fi

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          check-latest: true

      - name: Download Coverage Shards
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-report-${{ github.sha }}-shard-*
          path: coverage-shards

      - name: Merge Coverage Reports
        run: |
          node development/scripts/merge-jest-coverage.js coverage-shards coverage "${JEST_SHARD_TOTAL}"

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
