name: release-web

on:
  workflow_run:
    workflows:
      - daily-build
    types:
      - completed
  workflow_dispatch:
  workflow_call:
    inputs:
      build_number:
        type: string
        required: true
      build_bundle_version:
        type: string
        required: true
      build_source:
        type: string
        required: false
        default: 'daily-build'
      branch:
        type: string
        required: false
      commit:
        type: string
        required: false
      checkout_ref:
        type: string
        required: false
      skip_pages_deploy:
        type: boolean
        required: false
        default: false
      test_endpoint:
        type: string
        required: false
        default: ''
    secrets:
      COVALENT_KEY:
        required: false
      SENTRY_TOKEN:
        required: false
      SENTRY_DSN_REACT_NATIVE:
        required: false
      SENTRY_DSN_WEB:
        required: false
      SENTRY_DSN_DESKTOP:
        required: false
      SENTRY_DSN_MAS:
        required: false
      SENTRY_DSN_SNAP:
        required: false
      SENTRY_DSN_WINMS:
        required: false
      SENTRY_DSN_EXT:
        required: false
      SLACK_NOTIFICATION_WEBHOOK:
        required: false
      ACTION_SIGN_SECERT_KEY:
        required: false

env:
  NODE_ENV: production
  YARN_ENABLE_GLOBAL_CACHE: true

jobs:
  test-web:
    runs-on: ubuntu-24.04
    env:
      TEST_ENDPOINT: ${{ inputs.test_endpoint || 'app.onekeytest.com' }}

    if: ${{ !github.event.workflow_run || (github.event.workflow_run && github.event.workflow_run.conclusion == 'success') }}
    steps:
      - name: Show executed time
        run: |
          echo "Executed at: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: Validate workflow_run source
        if: github.event_name == 'workflow_run'
        run: |
          if [ "${{ github.event.workflow_run.head_repository.full_name }}" != "${{ github.repository }}" ]; then
            echo "::error::Rejecting workflow_run from fork repository"
            exit 1
          fi

      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true
          ref: ${{ inputs.checkout_ref || '' }}

      - name: Run Shared Env Setup
        uses: ./.github/actions/shared-env
        with:
          checkout_ref: ${{ inputs.checkout_ref || '' }}
          env_file_name: '.env'
          sentry_project: 'web'
          covalent_key: ${{ secrets.COVALENT_KEY }}
          sentry_token: ${{ secrets.SENTRY_TOKEN }}
          sentry_dsn_react_native: ${{ secrets.SENTRY_DSN_REACT_NATIVE }}
          sentry_dsn_web: ${{ secrets.SENTRY_DSN_WEB }}
          sentry_dsn_desktop: ${{ secrets.SENTRY_DSN_DESKTOP }}
          sentry_dsn_mas: ${{ secrets.SENTRY_DSN_MAS }}
          sentry_dsn_snap: ${{ secrets.SENTRY_DSN_SNAP }}
          sentry_dsn_winms: ${{ secrets.SENTRY_DSN_WINMS }}
          sentry_dsn_ext: ${{ secrets.SENTRY_DSN_EXT }}

      - name: Setup Environment
        uses: actions/setup-node@v6
        with:
          registry-url: 'https://npm.pkg.github.com'
          scope: '@onekeyhq'
          node-version: '24.x'
          cache: 'yarn'

      - name: Setup ENV
        run: |
          pkg_version=$(node -p "require('./apps/web/package.json').version")
          echo "pkg_version=$pkg_version"
          printf 'PKG_VERSION=%s\n' "$pkg_version" >> "$GITHUB_ENV"

          # For test environment, use GitHub Pages URL
          echo "PUBLIC_URL=https://${{ env.TEST_ENDPOINT }}/" >> $GITHUB_ENV

      - name: Override params from caller
        if: ${{ inputs.build_number }}
        run: |
          echo "BUILD_NUMBER=${{ inputs.build_number }}" >> $GITHUB_ENV
          echo "BUILD_BUNDLE_VERSION=${{ inputs.build_bundle_version }}" >> $GITHUB_ENV
          sed -i "s/^BUNDLE_VERSION=.*/BUNDLE_VERSION=${{ inputs.build_bundle_version }}/" .env
          sed -i "s/^CI_BUILD_NUMBER=.*/CI_BUILD_NUMBER=${{ inputs.build_number }}/" .env

      - name: Resolve branch and commit
        env:
          INPUT_BRANCH: ${{ inputs.branch }}
          INPUT_COMMIT: ${{ inputs.commit }}
          WR_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WR_COMMIT: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ -n "$INPUT_BRANCH" ]; then
            BRANCH="$INPUT_BRANCH"
            COMMIT="$INPUT_COMMIT"
          elif [ -n "$WR_COMMIT" ]; then
            BRANCH="$WR_BRANCH"
            COMMIT="$WR_COMMIT"
          else
            BRANCH="${{ github.ref_name }}"
            COMMIT="${{ github.sha }}"
          fi
          # Validate commit SHA format to prevent env injection
          if [[ ! "$COMMIT" =~ ^[0-9a-f]{7,40}$ ]]; then
            echo "::error::Invalid commit SHA format: $COMMIT"
            exit 1
          fi
          DELIMITER=$(uuidgen)
          {
            echo "BRANCH<<${DELIMITER}"
            echo "$BRANCH"
            echo "${DELIMITER}"
          } >> "$GITHUB_ENV"
          {
            echo "COMMIT<<${DELIMITER}"
            echo "$COMMIT"
            echo "${DELIMITER}"
          } >> "$GITHUB_ENV"
          COMMIT_MESSAGE=$(git log -1 --pretty=%s "$COMMIT" 2>/dev/null || echo "")
          {
            echo "COMMIT_MESSAGE<<${DELIMITER}"
            echo "$COMMIT_MESSAGE"
            echo "${DELIMITER}"
          } >> "$GITHUB_ENV"
          # Override commit SHA for the build. GITHUB_SHA is a built-in GitHub Actions
          # env var that cannot be reliably overridden via $GITHUB_ENV. Instead, set
          # WORKFLOW_GITHUB_SHA which takes priority in platformEnv.githubSHA.
          sed -i "s/^GITHUB_SHA=.*/GITHUB_SHA=$COMMIT/" .env
          echo "GITHUB_SHA=$COMMIT" >> $GITHUB_ENV
          echo "WORKFLOW_GITHUB_SHA=$COMMIT" >> $GITHUB_ENV
          echo "WORKFLOW_GITHUB_SHA=$COMMIT" >> .env
          # Override PUBLIC_URL with resolved commit for bundle releases (like production)
          if [ -n "${{ inputs.build_number }}" ]; then
            echo "PUBLIC_URL=https://${TEST_ENDPOINT}/${COMMIT}-${{ env.BUILD_NUMBER }}/" >> "$GITHUB_ENV"
          fi

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=${{ github.workspace }}/.yarn" >> "$GITHUB_OUTPUT"

      - name: Install Dependency
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: |
          yarn install --immutable

      - name: Build Target
        env:
          PUBLIC_URL: ${{ env.PUBLIC_URL }}
          NODE_OPTIONS: '--max_old_space_size=8192'
        run: |
          yarn app:web:build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-monorepo-test-${{ env.COMMIT }}-${{ env.BUILD_NUMBER }}
          path: |
            ./apps/web/web-build/

      - name: Deploy Github Pages
        if: ${{ !inputs.skip_pages_deploy }}
        uses: OneKeyHQ/actions/gh-pages@86ad045e18da7958f659995ee2f9df375dd03ef4 # pin to SHA
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/web-build
          cname: ${{ env.TEST_ENDPOINT }}
          force_orphan: true

  build-production:
    runs-on: ubuntu-24.04

    if: ${{ !github.event.workflow_run || (github.event.workflow_run && github.event.workflow_run.conclusion == 'success') }}
    steps:
      - name: Validate workflow_run source
        if: github.event_name == 'workflow_run'
        run: |
          if [ "${{ github.event.workflow_run.head_repository.full_name }}" != "${{ github.repository }}" ]; then
            echo "::error::Rejecting workflow_run from fork repository"
            exit 1
          fi

      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true
          ref: ${{ inputs.checkout_ref || '' }}

      - name: Run Shared Env Setup
        uses: ./.github/actions/shared-env
        with:
          checkout_ref: ${{ inputs.checkout_ref || '' }}
          env_file_name: '.env'
          sentry_project: 'web'
          covalent_key: ${{ secrets.COVALENT_KEY }}
          sentry_token: ${{ secrets.SENTRY_TOKEN }}
          sentry_dsn_react_native: ${{ secrets.SENTRY_DSN_REACT_NATIVE }}
          sentry_dsn_web: ${{ secrets.SENTRY_DSN_WEB }}
          sentry_dsn_desktop: ${{ secrets.SENTRY_DSN_DESKTOP }}
          sentry_dsn_mas: ${{ secrets.SENTRY_DSN_MAS }}
          sentry_dsn_snap: ${{ secrets.SENTRY_DSN_SNAP }}
          sentry_dsn_winms: ${{ secrets.SENTRY_DSN_WINMS }}
          sentry_dsn_ext: ${{ secrets.SENTRY_DSN_EXT }}

      - name: Setup Environment
        uses: actions/setup-node@v6
        with:
          registry-url: 'https://npm.pkg.github.com'
          scope: '@onekeyhq'
          node-version: '24.x'
          cache: 'yarn'

      - name: Setup ENV
        run: |
          pkg_version=$(node -p "require('./apps/web/package.json').version")
          echo "pkg_version=$pkg_version"
          printf 'PKG_VERSION=%s\n' "$pkg_version" >> "$GITHUB_ENV"

          # For production environment, use production URL
          echo "PUBLIC_URL=https://app-assets.onekey.so/${{ github.sha }}-${{ env.BUILD_NUMBER }}/" >> $GITHUB_ENV

      - name: Override params from caller
        if: ${{ inputs.build_number }}
        run: |
          echo "BUILD_NUMBER=${{ inputs.build_number }}" >> $GITHUB_ENV
          echo "BUILD_BUNDLE_VERSION=${{ inputs.build_bundle_version }}" >> $GITHUB_ENV
          sed -i "s/^BUNDLE_VERSION=.*/BUNDLE_VERSION=${{ inputs.build_bundle_version }}/" .env
          sed -i "s/^CI_BUILD_NUMBER=.*/CI_BUILD_NUMBER=${{ inputs.build_number }}/" .env

      - name: Resolve branch and commit
        env:
          INPUT_BRANCH: ${{ inputs.branch }}
          INPUT_COMMIT: ${{ inputs.commit }}
          WR_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WR_COMMIT: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ -n "$INPUT_BRANCH" ]; then
            BRANCH="$INPUT_BRANCH"
            COMMIT="$INPUT_COMMIT"
          elif [ -n "$WR_COMMIT" ]; then
            BRANCH="$WR_BRANCH"
            COMMIT="$WR_COMMIT"
          else
            BRANCH="${{ github.ref_name }}"
            COMMIT="${{ github.sha }}"
          fi
          # Validate commit SHA format to prevent env injection
          if [[ ! "$COMMIT" =~ ^[0-9a-f]{7,40}$ ]]; then
            echo "::error::Invalid commit SHA format: $COMMIT"
            exit 1
          fi
          DELIMITER=$(uuidgen)
          {
            echo "BRANCH<<${DELIMITER}"
            echo "$BRANCH"
            echo "${DELIMITER}"
          } >> "$GITHUB_ENV"
          {
            echo "COMMIT<<${DELIMITER}"
            echo "$COMMIT"
            echo "${DELIMITER}"
          } >> "$GITHUB_ENV"
          COMMIT_MESSAGE=$(git log -1 --pretty=%s "$COMMIT" 2>/dev/null || echo "")
          {
            echo "COMMIT_MESSAGE<<${DELIMITER}"
            echo "$COMMIT_MESSAGE"
            echo "${DELIMITER}"
          } >> "$GITHUB_ENV"
          # Override commit SHA for the build. GITHUB_SHA is a built-in GitHub Actions
          # env var that cannot be reliably overridden via $GITHUB_ENV. Instead, set
          # WORKFLOW_GITHUB_SHA which takes priority in platformEnv.githubSHA.
          sed -i "s/^GITHUB_SHA=.*/GITHUB_SHA=$COMMIT/" .env
          echo "GITHUB_SHA=$COMMIT" >> $GITHUB_ENV
          echo "WORKFLOW_GITHUB_SHA=$COMMIT" >> $GITHUB_ENV
          echo "WORKFLOW_GITHUB_SHA=$COMMIT" >> .env
          # Override PUBLIC_URL with resolved commit (replaces github.sha set by Setup ENV)
          echo "PUBLIC_URL=https://app-assets.onekey.so/${COMMIT}-${{ env.BUILD_NUMBER }}/" >> $GITHUB_ENV

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=${{ github.workspace }}/.yarn" >> "$GITHUB_OUTPUT"

      - name: Install Dependency
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: |
          yarn install --immutable

      - name: Build Target
        env:
          PUBLIC_URL: ${{ env.PUBLIC_URL }}
          NODE_OPTIONS: '--max_old_space_size=8192'
        run: |
          yarn app:web:build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-monorepo-${{ env.COMMIT }}-${{ env.BUILD_NUMBER }}
          path: |
            ./apps/web/web-build/

  notify:
    runs-on: ubuntu-24.04
    needs: [test-web, build-production]
    if: ${{ always() && (github.event.workflow_run || inputs.build_number) }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || '' }}

      - name: Run Shared Env Setup
        uses: ./.github/actions/shared-env
        with:
          checkout_ref: ${{ inputs.checkout_ref || '' }}
          env_file_name: '.env'
          sentry_project: 'web'
          covalent_key: ${{ secrets.COVALENT_KEY }}
          sentry_token: ${{ secrets.SENTRY_TOKEN }}
          sentry_dsn_react_native: ${{ secrets.SENTRY_DSN_REACT_NATIVE }}
          sentry_dsn_web: ${{ secrets.SENTRY_DSN_WEB }}
          sentry_dsn_desktop: ${{ secrets.SENTRY_DSN_DESKTOP }}
          sentry_dsn_mas: ${{ secrets.SENTRY_DSN_MAS }}
          sentry_dsn_snap: ${{ secrets.SENTRY_DSN_SNAP }}
          sentry_dsn_winms: ${{ secrets.SENTRY_DSN_WINMS }}
          sentry_dsn_ext: ${{ secrets.SENTRY_DSN_EXT }}

      - name: Setup ENV
        run: |
          artifacts_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          echo "ARTIFACTS_URL=$artifacts_url" >> $GITHUB_ENV

      - name: Override params from caller
        if: ${{ inputs.build_number }}
        run: |
          echo "BUILD_NUMBER=${{ inputs.build_number }}" >> $GITHUB_ENV
          echo "BUILD_BUNDLE_VERSION=${{ inputs.build_bundle_version }}" >> $GITHUB_ENV
          sed -i "s/^BUNDLE_VERSION=.*/BUNDLE_VERSION=${{ inputs.build_bundle_version }}/" .env
          sed -i "s/^CI_BUILD_NUMBER=.*/CI_BUILD_NUMBER=${{ inputs.build_number }}/" .env

      - name: Resolve branch and commit
        env:
          INPUT_BRANCH: ${{ inputs.branch }}
          INPUT_COMMIT: ${{ inputs.commit }}
          WR_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WR_COMMIT: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ -n "$INPUT_BRANCH" ]; then
            BRANCH="$INPUT_BRANCH"
            COMMIT="$INPUT_COMMIT"
          elif [ -n "$WR_COMMIT" ]; then
            BRANCH="$WR_BRANCH"
            COMMIT="$WR_COMMIT"
          else
            BRANCH="${{ github.ref_name }}"
            COMMIT="${{ github.sha }}"
          fi
          # Validate commit SHA format to prevent env injection
          if [[ ! "$COMMIT" =~ ^[0-9a-f]{7,40}$ ]]; then
            echo "::error::Invalid commit SHA format: $COMMIT"
            exit 1
          fi
          DELIMITER=$(uuidgen)
          {
            echo "BRANCH<<${DELIMITER}"
            echo "$BRANCH"
            echo "${DELIMITER}"
          } >> "$GITHUB_ENV"
          {
            echo "COMMIT<<${DELIMITER}"
            echo "$COMMIT"
            echo "${DELIMITER}"
          } >> "$GITHUB_ENV"

      - name: 'Notify to Slack'
        uses: onekeyhq/actions/slack-notify-webhook@86ad045e18da7958f659995ee2f9df375dd03ef4 # pin to SHA
        with:
          web-hook-url: ${{ secrets.SLACK_NOTIFICATION_WEBHOOK }}
          secret-key: ${{ secrets.ACTION_SIGN_SECERT_KEY }}
          artifact-type: Web
          artifact-name: OneKey-Web
          artifact-bundle-id: 'so.onekey.wallet.web'
          artifact-version-name: '${{ env.BUILD_APP_VERSION }}@${{ env.BUILD_NUMBER }}'
          artifact-version-code: '${{ env.BUILD_NUMBER }}'
          artifact-download-url: '${{ env.ARTIFACTS_URL }}'
          artifact-skip-gpg: '${{ env.ONEKEY_ALLOW_SKIP_GPG_VERIFICATION }}'
          artifact-bundle-version: '${{ env.BUILD_BUNDLE_VERSION }}'
          artifact-build-source: '${{ inputs.build_source || ''daily-build'' }}'
          artifact-branch: '${{ env.BRANCH }}'
          artifact-commit: '${{ env.COMMIT }}'
