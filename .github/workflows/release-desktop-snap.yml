name: release-desktop-snap

on:
  workflow_dispatch:
    inputs:
      ONEKEY_ALLOW_SKIP_GPG_VERIFICATION:
        description: 'Allow skipping GPG verification for bundle updates (default: false)'
        required: false
        type: boolean
        default: false

env:
  NODE_ENV: production
  YARN_ENABLE_GLOBAL_CACHE: true
  ONEKEY_ALLOW_SKIP_GPG_VERIFICATION: ${{ github.event.inputs.ONEKEY_ALLOW_SKIP_GPG_VERIFICATION || 'false' }}

jobs:
  release-desktop-snap:
    strategy:
      matrix:
        node-version: [24.x]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runs-on: ubuntu-24.04
            build-flag: --x64
          - arch: arm64
            runs-on: ubuntu-24.04-arm
            build-flag: --arm64
    runs-on: ${{ matrix.runs-on }}

    if: ${{ !github.event.workflow_run || (github.event.workflow_run && github.event.workflow_run.conclusion == 'success') }}
    steps:
      - name: Show executed time
        run: |
          echo "Executed at: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev
      - name: Run Shared Env Setup
        uses: ./.github/actions/shared-env
        with:
          env_file_name: '.env'
          sentry_project: 'desktop-snap'
          covalent_key: ${{ secrets.COVALENT_KEY }}
          sentry_token: ${{ secrets.SENTRY_TOKEN }}
          sentry_dsn_react_native: ${{ secrets.SENTRY_DSN_REACT_NATIVE }}
          sentry_dsn_web: ${{ secrets.SENTRY_DSN_WEB }}
          sentry_dsn_desktop: ${{ secrets.SENTRY_DSN_DESKTOP }}
          sentry_dsn_mas: ${{ secrets.SENTRY_DSN_MAS }}
          sentry_dsn_snap: ${{ secrets.SENTRY_DSN_SNAP }}
          sentry_dsn_winms: ${{ secrets.SENTRY_DSN_WINMS }}
          sentry_dsn_ext: ${{ secrets.SENTRY_DSN_EXT }}

      - name: Warn if GPG verification is skipped
        if: ${{ env.ONEKEY_ALLOW_SKIP_GPG_VERIFICATION == 'true' }}
        run: |
          echo "::warning::GPG verification is SKIPPED for this build. This should only be used in CI/dev builds."

      - name: Install Snapcraft
        uses: samuelmeuli/action-snapcraft@v2

      - name: Install snap dependencies for snapcraft build
        run: |
          sudo snap install core24
          sudo snap install gnome-46-2404
          sudo snap install mesa-2404
          sudo snap install gtk-common-themes

      - name: Configure Snapcraft destructive mode
        run: |
          echo "SNAP_DESTRUCTIVE_MODE=true" >> $GITHUB_ENV

      - name: 'Setup ENV'
        run: |
          eval "$(node -e 'const v=require("./apps/desktop/package.json").version; console.log("pkg_version="+v)')"
          echo '$pkg_version='$pkg_version
          echo "PKG_VERSION=$pkg_version" >> $GITHUB_ENV

          artifacts_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          echo "ARTIFACTS_URL=$artifacts_url" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@onekeyhq'

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=${{ github.workspace }}/.yarn" >> "$GITHUB_OUTPUT"

      - name: Install Dep
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max_old_space_size=8192'
        run: |
          yarn install --immutable

      - name: Build Renderer
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
          SENTRY_UPLOAD_BY_CLI: 'true'
        run: |
          cd apps/desktop
          npx cross-env NODE_ENV=production yarn clean:build
          npx cross-env NODE_ENV=production NODE_OPTIONS=--max-old-space-size=8192 webpack build

      - name: Upload Desktop Snap Sourcemaps to Sentry
        id: upload_desktop_snap_sourcemaps
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_TOKEN }}
          SENTRY_ORG: onekey-bb
          SENTRY_PROJECT: desktop-snap
          BUILD_APP_VERSION: ${{ env.BUILD_APP_VERSION }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "No SENTRY_AUTH_TOKEN - skipping desktop snap sourcemap upload."
            echo "uploaded=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RELEASE="$BUILD_APP_VERSION ($BUILD_NUMBER)"
          npx sentry-cli releases new "$RELEASE" || true
          if npx sentry-cli sourcemaps upload --release "$RELEASE" --url-prefix "~/" ./apps/desktop/web-build; then
            npx sentry-cli releases finalize "$RELEASE" || true
            echo "uploaded=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Desktop snap Sentry sourcemap upload failed; archiving sourcemaps before stripping them from renderer artifact."
            echo "uploaded=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Desktop Snap Sourcemap Diagnostic Artifact
        if: always() && steps.upload_desktop_snap_sourcemaps.outputs.uploaded != 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: desktop-snap-sourcemaps-${{ matrix.arch }}-${{ github.sha }}
          path: |
            ./apps/desktop/web-build/**/*.js.map
            ./apps/desktop/web-build/**/*.css.map
          if-no-files-found: ignore
          retention-days: 30

      - name: Cleanup Desktop Snap Sourcemaps and License Files
        if: always()
        continue-on-error: true
        run: |
          if [ ! -d ./apps/desktop/web-build ]; then
            echo "Desktop web-build directory does not exist - skipping sourcemap cleanup."
            exit 0
          fi

          find ./apps/desktop/web-build -name '*.LICENSE.txt' -type f -exec rm -f {} +
          find ./apps/desktop/web-build \
            -type f \( -name '*.js.map' -o -name '*.css.map' \) \
            -exec rm -f {} +

      - name: Build and Sign Snap Linux
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
          APPLEID: ${{ secrets.APPLEID }}
          APPLEIDPASS: ${{ secrets.APPLEIDPASS }}
          ASC_PROVIDER: ${{ secrets.ASC_PROVIDER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: './sign.p12'
          SNAP: true
        run: |
          cd apps/desktop
          node scripts/finalize-renderer-assets.js
          artifact_maps="$(find ./app/build \
            -type f \( -name '*.js.map' -o -name '*.css.map' \) \
            -print)"
          if [ -n "$artifact_maps" ]; then
            echo "::warning::Desktop snap package still contains sourcemaps after finalize; removing before packaging:"
            echo "$artifact_maps"
            find ./app/build \
              -type f \( -name '*.js.map' -o -name '*.css.map' \) \
              -exec rm -f {} +
          fi
          remaining_maps="$(find ./app/build \
            -type f \( -name '*.js.map' -o -name '*.css.map' \) \
            -print)"
          if [ -n "$remaining_maps" ]; then
            echo "::error::Desktop snap package still contains sourcemaps:"
            echo "$remaining_maps"
            exit 1
          fi
          yarn build:main
          yarn install-app-deps
          npx electron-builder build -l --config electron-builder-snap.config.js ${{ matrix.build-flag }} --publish never

      - name: Upload Artifacts Release
        uses: actions/upload-artifact@v4
        with:
          name: onekey-desktop-snap-${{ matrix.arch }}-${{ env.BUILD_APP_VERSION }}-${{ env.BUILD_NUMBER }}-${{ env.BUILD_BUNDLE_VERSION }}-${{ github.sha }}
          path: |
            ./apps/desktop/build-electron/*
            !./apps/desktop/build-electron/win-unpacked
            !./apps/desktop/build-electron/mac-arm64
            !./apps/desktop/build-electron/mac
            !./apps/desktop/build-electron/linux-unpacked
            !./apps/desktop/build-electron/linux-arm64-unpacked
            !./apps/desktop/build-electron/builder-debug.yml

      - name: Upload Artifacts to Snap Linux
        if: ${{ github.event.workflow_run }}
        continue-on-error: true
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
        run: |
          snapcraft push ./apps/desktop/build-electron/*.snap --release edge

      - name: 'Notify to Slack'
        if: ${{ github.event.workflow_run }}
        uses: onekeyhq/actions/slack-notify-webhook@86ad045e18da7958f659995ee2f9df375dd03ef4 # pin to SHA
        with:
          web-hook-url: ${{ secrets.SLACK_NOTIFICATION_WEBHOOK }}
          secret-key: ${{ secrets.ACTION_SIGN_SECERT_KEY }}
          artifact-type: Desktop
          artifact-name: OneKey-Desktop-Linux-Snap-RN
          artifact-bundle-id: 'so.onekey.wallet.desktop'
          artifact-version-name: '${{ env.BUILD_APP_VERSION }}@${{ env.BUILD_NUMBER }}'
          artifact-version-code: '${{ env.BUILD_NUMBER }}'
          artifact-download-url: '${{ env.ARTIFACTS_URL }}'
          artifact-skip-gpg: '${{ env.ONEKEY_ALLOW_SKIP_GPG_VERIFICATION }}'
          artifact-bundle-version: '${{ env.BUILD_BUNDLE_VERSION }}'
