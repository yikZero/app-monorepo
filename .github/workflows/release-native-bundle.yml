name: release-native-bundle

on:
  # Auto-fire after `daily-build` succeeds so cron-triggered builds still
  # produce iOS/Android OTA bundles + QA artifacts. Mirrors release-web and
  # release-desktop-bundle, which also chain off daily-build.
  workflow_run:
    workflows:
      - daily-build
    types:
      - completed
  workflow_dispatch:
  workflow_call:
    inputs:
      build_number:
        type: string
        required: true
      build_bundle_version:
        type: string
        required: true
      build_source:
        type: string
        required: false
        default: 'daily-build'
      branch:
        type: string
        required: false
      commit:
        type: string
        required: false
      checkout_ref:
        type: string
        required: false
      platform:
        # Optional: when set to "ios" or "android", only that platform is
        # built. When unset/empty (workflow_dispatch only), both platforms
        # are built in parallel via the matrix below.
        # release-app-bundles.yml uses this to expose iOS and Android as
        # sibling top-level slots alongside desktop-bundle / web-bundle.
        type: string
        required: false
        default: ''
      web_embed_artifact:
        # Name of an upstream actions/upload-artifact entry containing a
        # pre-built apps/web-embed/web-build/. When set, the platform job
        # downloads it and skips its local webpack run. Used by
        # release-app-bundles.yml to share ONE web-embed build across the
        # iOS and Android slots. Empty for direct workflow_dispatch — each
        # platform falls back to running webpack locally.
        type: string
        required: false
        default: ''
    secrets:
      COVALENT_KEY:
        required: false
      SENTRY_TOKEN:
        required: false
      SENTRY_DSN_REACT_NATIVE:
        required: false
      SENTRY_DSN_WEB:
        required: false
      SENTRY_DSN_DESKTOP:
        required: false
      SENTRY_DSN_MAS:
        required: false
      SENTRY_DSN_SNAP:
        required: false
      SENTRY_DSN_WINMS:
        required: false
      SENTRY_DSN_EXT:
        required: false
      APPLEID:
        required: false
      APPLEIDPASS:
        required: false
      ASC_PROVIDER:
        required: false
      QA_JS_BUNDLE_SERVER_URL:
        required: false
      QA_JS_BUNDLE_UPLOAD_SECRET:
        required: false
      SLACK_NOTIFICATION_WEBHOOK:
        required: false
      ACTION_SIGN_SECERT_KEY:
        required: false

env:
  NODE_ENV: production
  YARN_ENABLE_GLOBAL_CACHE: true

# Restrict GITHUB_TOKEN to the minimum scopes this workflow actually uses.
# Prevents CodeQL from flagging the `workflow_run` trigger as a privileged
# context with implicit write access (the `permissions:` block downgrades the
# token from the default contents:write to contents:read).
#   - contents: read   → actions/checkout, downloading source.
#   - packages: read   → yarn install from npm.pkg.github.com (NODE_AUTH_TOKEN).
#   - actions: read    → reading github.event.workflow_run metadata.
permissions:
  contents: read
  packages: read
  actions: read

jobs:
  # Compute BUILD_BUNDLE_VERSION ONCE for the run so the iOS and Android
  # matrix arms below produce identical bundleVersion / Sentry release / QA
  # metadata. Without this, each matrix arm's `Setup ENV` step falls back to
  # `date -u +%s` independently, drifting the two platforms apart whenever
  # the matrix arms boot at different seconds. workflow_call still wins via
  # `inputs.build_bundle_version` (the prepare-params output passed by
  # release-app-bundles.yml).
  prepare-bundle-version:
    if: ${{ !github.event.workflow_run || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      build_bundle_version: ${{ steps.compute.outputs.value }}
    steps:
      - name: Validate workflow_run source
        if: github.event_name == 'workflow_run'
        run: |
          if [ "${{ github.event.workflow_run.head_repository.full_name }}" != "${{ github.repository }}" ]; then
            echo "::error::Rejecting workflow_run from fork repository"
            exit 1
          fi

      - name: Compute BUILD_BUNDLE_VERSION
        id: compute
        run: |
          if [ -n "${{ inputs.build_bundle_version }}" ]; then
            echo "value=${{ inputs.build_bundle_version }}" >> "$GITHUB_OUTPUT"
          else
            EPOCH_2026=$(date -u -d '2026-01-01T00:00:00' +%s 2>/dev/null \
              || date -u -j -f '%Y-%m-%dT%H:%M:%S' '2026-01-01T00:00:00' +%s)
            NOW=$(date -u +%s)
            echo "value=$(( NOW - EPOCH_2026 ))" >> "$GITHUB_OUTPUT"
          fi

  # web-embed prebuild lives in the orchestrator (release-app-bundles.yml) so
  # iOS and Android — which here are sibling workflow_call invocations of this
  # workflow — can share ONE web-embed artifact. Without that lift, each
  # workflow_call would internally re-run webpack (the symptom: two
  # web-embed-build nodes in the orchestrator UI).
  #
  # Direct workflow_dispatch on this workflow has no upstream artifact:
  # buildWebEmbed() in build-bundle-base.js falls back to running webpack
  # locally per-platform. Acceptable for ad-hoc testing.
  release-native-bundle:
    # `needs:` alone gives us the right gating: if prepare-bundle-version
    # skips (workflow_run from a fork) or fails, the matrix arms also skip.
    # No explicit `if:` here — adding `!cancelled() && !failure()` would
    # silently bypass the fork-source rejection.
    needs: prepare-bundle-version
    name: release-native-bundle (${{ matrix.platform }})
    runs-on: ubuntu-latest
    # Run iOS and Android JS bundles in parallel. Each platform's build is
    # independent (separate out-dir-bundle/<platform> + own zip artifact +
    # own Slack/QA notification), so a failure on one no longer blocks the
    # other. fail-fast=false avoids canceling iOS just because Android failed.
    #
    # When called via workflow_call with `inputs.platform` set, the matrix is
    # narrowed to that single platform — release-app-bundles.yml uses this to
    # call this workflow twice (once for ios, once for android) so iOS and
    # Android show up as sibling top-level slots in the orchestrator UI.
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ inputs.platform != '' && fromJSON(format('["{0}"]', inputs.platform)) || fromJSON('["ios","android"]') }}
        node-version: [24.x]

    steps:
      - name: Show executed time
        run: |
          echo "Executed at: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "Building platform: ${{ matrix.platform }}"

      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true
          ref: ${{ inputs.checkout_ref || '' }}

      - name: Pin WORKFLOW_BUNDLE_VERSION from prepare job
        # shared-env/action.yml reads WORKFLOW_BUNDLE_VERSION first (line ~117)
        # before falling back to its own `date - epoch` computation. Seeding
        # it here makes shared-env emit the unified value into BOTH the
        # process env (BUILD_BUNDLE_VERSION) AND the on-disk `.env` file
        # (BUNDLE_VERSION=…). Without this, .env would still receive a
        # per-arm timestamp and the JS bundle's runtime `bundleVersion` would
        # disagree with the artifact / Sentry release metadata.
        run: |
          echo "WORKFLOW_BUNDLE_VERSION=${{ needs.prepare-bundle-version.outputs.build_bundle_version }}" >> $GITHUB_ENV

      - name: Run Shared Env Setup
        uses: ./.github/actions/shared-env
        with:
          checkout_ref: ${{ inputs.checkout_ref || '' }}
          env_file_name: '.env'
          sentry_project: 'react-native'
          covalent_key: ${{ secrets.COVALENT_KEY }}
          sentry_token: ${{ secrets.SENTRY_TOKEN }}
          sentry_dsn_react_native: ${{ secrets.SENTRY_DSN_REACT_NATIVE }}
          sentry_dsn_web: ${{ secrets.SENTRY_DSN_WEB }}
          sentry_dsn_desktop: ${{ secrets.SENTRY_DSN_DESKTOP }}
          sentry_dsn_mas: ${{ secrets.SENTRY_DSN_MAS }}
          sentry_dsn_snap: ${{ secrets.SENTRY_DSN_SNAP }}
          sentry_dsn_winms: ${{ secrets.SENTRY_DSN_WINMS }}
          sentry_dsn_ext: ${{ secrets.SENTRY_DSN_EXT }}

      - name: 'Setup ENV'
        run: |
          eval "$(node -e 'const v=require("./apps/desktop/package.json").version; console.log("pkg_version="+v)')"
          echo '$pkg_version='$pkg_version
          echo "PKG_VERSION=$pkg_version" >> $GITHUB_ENV
          artifacts_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          echo "ARTIFACTS_URL=$artifacts_url" >> $GITHUB_ENV
          # Pull from the precursor `prepare-bundle-version` job so iOS and
          # Android matrix arms share one value. The `Override params from
          # caller` step below still wins for workflow_call invocations.
          echo "BUILD_BUNDLE_VERSION=${{ needs.prepare-bundle-version.outputs.build_bundle_version }}" >> $GITHUB_ENV

      - name: Override params from caller
        if: ${{ inputs.build_number }}
        run: |
          echo "BUILD_NUMBER=${{ inputs.build_number }}" >> $GITHUB_ENV
          echo "BUILD_BUNDLE_VERSION=${{ inputs.build_bundle_version }}" >> $GITHUB_ENV
          # Also update .env file since shared-env already wrote the old values
          sed -i "s/^BUNDLE_VERSION=.*/BUNDLE_VERSION=${{ inputs.build_bundle_version }}/" .env
          sed -i "s/^CI_BUILD_NUMBER=.*/CI_BUILD_NUMBER=${{ inputs.build_number }}/" .env

      - name: Resolve branch and commit
        env:
          INPUT_BRANCH: ${{ inputs.branch }}
          INPUT_COMMIT: ${{ inputs.commit }}
        run: |
          if [ -n "$INPUT_BRANCH" ]; then
            BRANCH="$INPUT_BRANCH"
            COMMIT="$INPUT_COMMIT"
          else
            BRANCH="${{ github.ref_name }}"
            COMMIT="${{ github.sha }}"
          fi
          # Validate commit SHA format to prevent env injection
          if [[ ! "$COMMIT" =~ ^[0-9a-f]{7,40}$ ]]; then
            echo "::error::Invalid commit SHA format: $COMMIT"
            exit 1
          fi
          DELIMITER=$(uuidgen)
          {
            echo "BRANCH<<${DELIMITER}"
            echo "$BRANCH"
            echo "${DELIMITER}"
          } >> "$GITHUB_ENV"
          {
            echo "COMMIT<<${DELIMITER}"
            echo "$COMMIT"
            echo "${DELIMITER}"
          } >> "$GITHUB_ENV"
          COMMIT_MESSAGE=$(git log -1 --pretty=%s "$COMMIT" 2>/dev/null || echo "")
          {
            echo "COMMIT_MESSAGE<<${DELIMITER}"
            echo "$COMMIT_MESSAGE"
            echo "${DELIMITER}"
          } >> "$GITHUB_ENV"
          # Override commit SHA for the build. GITHUB_SHA is a built-in GitHub Actions
          # env var that cannot be reliably overridden via $GITHUB_ENV. Instead, set
          # WORKFLOW_GITHUB_SHA which takes priority in platformEnv.githubSHA.
          sed -i "s/^GITHUB_SHA=.*/GITHUB_SHA=$COMMIT/" .env
          echo "GITHUB_SHA=$COMMIT" >> $GITHUB_ENV
          echo "WORKFLOW_GITHUB_SHA=$COMMIT" >> $GITHUB_ENV
          echo "WORKFLOW_GITHUB_SHA=$COMMIT" >> .env

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@onekeyhq'

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=${{ github.workspace }}/.yarn" >> "$GITHUB_OUTPUT"

      - name: Install Dep
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max_old_space_size=8192'
        run: |
          yarn install --immutable

      - name: Download pre-built web-embed bundle
        # Restores apps/web-embed/web-build/ from an upstream web-embed-build
        # job in the orchestrator (release-app-bundles.yml). When running via
        # direct workflow_dispatch with no upstream artifact, this step is
        # skipped and buildWebEmbed() in build-bundle-base.js falls back to
        # running webpack locally.
        if: ${{ inputs.web_embed_artifact != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.web_embed_artifact }}
          path: apps/web-embed/web-build

      - name: Build Bundle
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
          APPLEID: ${{ secrets.APPLEID }}
          APPLEIDPASS: ${{ secrets.APPLEIDPASS }}
          ASC_PROVIDER: ${{ secrets.ASC_PROVIDER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UNION_BUILD: 'true'
          ENABLE_NATIVE_BACKGROUND_THREAD: 'true'
        run: 'yarn app:build-bundle:${{ matrix.platform }}'

      - name: Validate split-bundle integrity
        # Hard gate: fails the job if any segment ships un-rewritten Metro
        # async-require URLs (REACT-NATIVE-4AX class). Must run AFTER Build
        # Bundle (so segments exist to scan) and BEFORE upload zips (so a
        # failure aborts publishing the OTA artifact to QA / users).
        run: node apps/mobile/scripts/check-split-bundle-integrity.js

      - name: upload zips
        uses: actions/upload-artifact@v4
        # Hard fail: the downstream `qa-upload` job downloads this artifact.
        # If we let a flaky upload pass silently, the build job succeeds,
        # qa metadata gets stashed, qa-upload then fails at download — and
        # rerun-failed-jobs only reruns qa-upload, never recreating the
        # bundle artifact.
        with:
          name: release-native-bundle-${{ matrix.platform }}-zips-${{ env.BUILD_APP_VERSION }}-${{ env.BUILD_NUMBER }}-${{ env.BUILD_BUNDLE_VERSION }}-${{ github.sha }}
          path: |
            ./apps/mobile/out-dir-bundle-zip
            !**/.DS_Store

      - name: upload bundles
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: release-native-bundle-${{ matrix.platform }}-sources-${{ env.BUILD_APP_VERSION }}-${{ env.BUILD_NUMBER }}-${{ env.BUILD_BUNDLE_VERSION }}-${{ github.sha }}
          path: |
            ./apps/mobile/out-dir-bundle/${{ matrix.platform }}
            !**/.DS_Store

      # Stash the metadata the downstream qa-upload job needs. Lifting QA
      # upload out of this build job means a flaky QA server no longer forces
      # a full re-bundle on rerun-failed-jobs. We pass everything via a small
      # artifact (instead of job outputs) because matrix jobs cannot expose
      # per-arm outputs reliably.
      - name: Stash QA upload metadata
        run: |
          mkdir -p ./qa-upload-meta
          jq -n \
            --arg artifact_name "release-native-bundle-${{ matrix.platform }}-zips-${BUILD_APP_VERSION}-${BUILD_NUMBER}-${BUILD_BUNDLE_VERSION}-${{ github.sha }}" \
            --arg commit "$COMMIT" \
            --arg branch "$BRANCH" \
            --arg commit_message "$COMMIT_MESSAGE" \
            '{artifact_name:$artifact_name, commit:$commit, branch:$branch, commit_message:$commit_message}' \
            > ./qa-upload-meta/meta.json

      - name: Upload QA metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-native-bundle-${{ matrix.platform }}-qa-upload-meta-${{ github.run_id }}
          path: ./qa-upload-meta
          retention-days: 1
          if-no-files-found: error

      - name: 'Notify to Slack'
        uses: onekeyhq/actions/slack-notify-webhook@86ad045e18da7958f659995ee2f9df375dd03ef4 # pin to SHA
        continue-on-error: true
        with:
          web-hook-url: ${{ secrets.SLACK_NOTIFICATION_WEBHOOK }}
          secret-key: ${{ secrets.ACTION_SIGN_SECERT_KEY }}
          artifact-type: React-Native-Bundle-${{ matrix.platform }}
          artifact-name: OneKey-Native-Bundle-${{ matrix.platform }}
          artifact-bundle-id: 'so.onekey.wallet'
          artifact-version-name: '${{ env.BUILD_APP_VERSION }}@${{ env.BUILD_NUMBER }}'
          artifact-version-code: '${{ env.BUILD_NUMBER }}'
          artifact-download-url: '${{ env.ARTIFACTS_URL }}'
          artifact-bundle-version: '${{ env.BUILD_BUNDLE_VERSION }}'
          artifact-build-source: '${{ inputs.build_source || ''daily-build'' }}'
          artifact-branch: '${{ env.BRANCH }}'
          artifact-commit: '${{ env.COMMIT }}'

  # Separate job so a transient QA server failure can be retried via
  # rerun-failed-jobs without triggering another full native bundle build
  # (each platform is ~8-10 minutes). Same matrix as release-native-bundle so
  # iOS and Android upload independently and one slot's failure doesn't block
  # the other.
  #
  # Two scenarios the `if:` has to thread:
  # 1. Upstream `release-native-bundle` is *skipped* (workflow_run fired with a
  #    failed daily-build, or prepare-bundle-version skipped). `!cancelled() &&
  #    !failure()` is true for "skipped", so qa-upload would run and fail at
  #    metadata download. Require explicit success-or-failure result.
  # 2. Upstream is a matrix (ios + android). `needs.X.result` is the aggregate
  #    — one slot failing reports 'failure' even when the other succeeded. We
  #    still want to run qa-upload for the succeeded slot, so accept 'failure'
  #    here. With `fail-fast: false` below, the failed-platform qa-upload slot
  #    fails at "Download QA upload metadata" (its artifact never uploaded),
  #    which is the right outcome and keeps the good platform unblocked.
  qa-upload:
    needs: release-native-bundle
    if: ${{ needs.release-native-bundle.result == 'success' || needs.release-native-bundle.result == 'failure' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ inputs.platform != '' && fromJSON(format('["{0}"]', inputs.platform)) || fromJSON('["ios","android"]') }}
    steps:
      - name: Download QA upload metadata
        uses: actions/download-artifact@v4
        with:
          name: release-native-bundle-${{ matrix.platform }}-qa-upload-meta-${{ github.run_id }}
          path: ./qa-upload-meta

      - name: Read metadata
        id: meta
        run: |
          meta=./qa-upload-meta/meta.json
          {
            echo "artifact_name=$(jq -r .artifact_name "$meta")"
            echo "commit=$(jq -r .commit "$meta")"
            echo "branch=$(jq -r .branch "$meta")"
          } >> "$GITHUB_OUTPUT"
          DELIMITER=$(uuidgen)
          {
            echo "commit_message<<${DELIMITER}"
            jq -r .commit_message "$meta"
            echo "${DELIMITER}"
          } >> "$GITHUB_OUTPUT"

      - name: Download bundle zips
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ./bundle-zip

      - name: Upload QA Bundles
        uses: onekeyhq/actions/qa-bundle-upload@86ad045e18da7958f659995ee2f9df375dd03ef4 # pin to SHA
        with:
          server-url: ${{ secrets.QA_JS_BUNDLE_SERVER_URL }}
          upload-secret: ${{ secrets.QA_JS_BUNDLE_UPLOAD_SECRET }}
          bundle-dir: ./bundle-zip
          commit-hash: ${{ steps.meta.outputs.commit }}
          branch: ${{ steps.meta.outputs.branch }}
          pr-title: ${{ steps.meta.outputs.commit_message }}
