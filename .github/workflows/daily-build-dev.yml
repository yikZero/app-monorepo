name: daily-build-dev

on:
  workflow_dispatch:
    inputs:
      ONEKEY_ALLOW_SKIP_GPG_VERIFICATION:
        description: "Allow skipping GPG verification for bundle updates (default: false)"
        required: false
        type: boolean
        default: false

jobs:
  daily-build:
    runs-on: ubuntu-24.04
    # needs: get-commit-id
    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - name: 'Setup ENV'
        run: |
          echo "Executed at: $(date '+%Y-%m-%d %H:%M:%S')"
          DATE=`date "+%m%d"`
          run_number=$(($GITHUB_RUN_NUMBER % 100))
          run_number=$(printf "%02d" $run_number)
          build_number="1000${DATE}${run_number}"
          echo '$build_number='$build_number
          
          echo "BUILD_NUMBER=$build_number" >> $GITHUB_ENV

      - name: Warn if GPG verification is skipped
        if: ${{ github.event.inputs.ONEKEY_ALLOW_SKIP_GPG_VERIFICATION == 'true' }}
        run: |
          echo "::warning::GPG verification is SKIPPED for this build. This should only be used in CI/dev builds."

      - name: Save workflow parameters
        run: |
          mkdir -p ./workflow-data
          echo "WORKFLOW_GITHUB_SHA=${{ github.sha }}" >> ./workflow-data/params.env
          echo "WORKFLOW_GITHUB_REF_NAME=${{ github.ref_name }}" >> ./workflow-data/params.env
          echo "WORKFLOW_BUILD_NUMBER=${{ env.BUILD_NUMBER }}" >> ./workflow-data/params.env
          echo "ONEKEY_ALLOW_SKIP_GPG_VERIFICATION=${{ github.event.inputs.ONEKEY_ALLOW_SKIP_GPG_VERIFICATION || 'false' }}" >> ./workflow-data/params.env
      
      - name: Upload workflow parameters
        uses: actions/upload-artifact@v4
        with:
          name: workflow-params
          path: workflow-data/params.env
          retention-days: 1
   


   