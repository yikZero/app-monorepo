name: release-ios-debug

on:
  workflow_dispatch:
    inputs:
      ONEKEY_ALLOW_SKIP_GPG_VERIFICATION:
        description: "Allow skipping GPG verification for bundle updates (default: false)"
        required: false
        type: boolean
        default: false

env:
  NODE_ENV: production
  YARN_ENABLE_GLOBAL_CACHE: true
  ONEKEY_ALLOW_SKIP_GPG_VERIFICATION: ${{ github.event.inputs.ONEKEY_ALLOW_SKIP_GPG_VERIFICATION || 'false' }}

jobs:
  release-ios-debug:
    runs-on: macos-26
    strategy:
      matrix:
        node-version: [24.x]
        ruby-version: [3.4.4]
        xcode-version: [26.0]

    steps:
      - name: Show executed time
        run: |
          echo "Executed at: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Run Shared Env Setup
        uses: ./.github/actions/shared-env
        with:
          env_file_name: '.env.expo'
          sentry_project: ''
          covalent_key: ${{ secrets.COVALENT_KEY }}
          sentry_token: ${{ secrets.SENTRY_TOKEN }}
          sentry_dsn_react_native: ${{ secrets.SENTRY_DSN_REACT_NATIVE }}
          sentry_dsn_web: ${{ secrets.SENTRY_DSN_WEB }}
          sentry_dsn_desktop: ${{ secrets.SENTRY_DSN_DESKTOP }}
          sentry_dsn_mas: ${{ secrets.SENTRY_DSN_MAS }}
          sentry_dsn_snap: ${{ secrets.SENTRY_DSN_SNAP }}
          sentry_dsn_winms: ${{ secrets.SENTRY_DSN_WINMS }}
          sentry_dsn_ext: ${{ secrets.SENTRY_DSN_EXT }}

      - name: Warn if GPG verification is skipped
        if: ${{ env.ONEKEY_ALLOW_SKIP_GPG_VERIFICATION == 'true' }}
        run: |
          echo "::warning::GPG verification is SKIPPED for this build. This should only be used in CI/dev builds."

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@onekeyhq'

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=${{ github.workspace }}/.yarn" >> "$GITHUB_OUTPUT"

      - name: Show SDKs
        run: |
          xcodebuild -showsdks

      - name: Install Dep
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max_old_space_size=8192'
        run: |
          yarn install --immutable

      - name: Configure Git to use HTTPS instead of SSH
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:

      - name: Install Pods
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max_old_space_size=8192'
        run: |
          cd apps/mobile/ios
          gem install cocoapods -v 1.16.2
          pod install

      - name: Build App File
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
          SENTRY_DISABLE_AUTO_UPLOAD: 'true'
        run: |
          yarn app:web-embed:build
          cd apps/mobile/ios
          xcodebuild -workspace OneKeyWallet.xcworkspace -configuration Debug -scheme OneKeyWallet -sdk iphonesimulator -derivedDataPath ./outputs

      - name: Zip artifact
        run: |
          cd apps/mobile/ios/outputs/Build/Products/Debug-iphonesimulator
          zip OneKeyWallet-Debug.zip OneKeyWallet.app/* -r

      - name: Upload App File
        uses: actions/upload-artifact@v4
        with:
          name: release-ios-debug-${{ github.sha }}
          path: |
            ./apps/mobile/ios/outputs/Build/Products/Debug-iphonesimulator/OneKeyWallet-Debug.zip
          if-no-files-found: error
