name: daily-build

on:
  schedule:
    - cron: '30 19 * * 0,1,2,3,4,5,6'
  workflow_dispatch:
    inputs:
      ONEKEY_ALLOW_SKIP_GPG_VERIFICATION:
        description: "Allow skipping GPG verification for bundle updates (default: false)"
        required: false
        type: boolean
        default: false

jobs:
