name: bundlediff-ios

on:
  pull_request:
    branches: [onekey]

# Cancel a currently running workflow from the same PR/branch/tag
# when a new workflow is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  YARN_ENABLE_GLOBAL_CACHE: true

jobs:
  # Build current and upload stats.json
  # You may replace this with your own build method. All that
  # is required is that the stats.json be an artifact
  build-ios-head:
    name: 'Build ios head'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{github.event.pull_request.head.ref}}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'yarn'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@onekeyhq'

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=${{ github.workspace }}/.yarn" >> "$GITHUB_OUTPUT"

      - name: Install Dependency
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: |
          yarn install --immutable

      - name: Generate stats.json
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: yarn stats:ios

      - name: Upload stats.json
        uses: actions/upload-artifact@v4
        with:
          name: head-stats
          path: ./apps/app/stats.json

  # Build base for comparison and upload stats.json
  # You may replace this with your own build method. All that
  # is required is that the stats.json be an artifact
  build-ios-base:
    name: 'Build ios base'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'yarn'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@onekeyhq'
          
      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=${{ github.workspace }}/.yarn" >> "$GITHUB_OUTPUT"

      - name: Install Dependency
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: |
          yarn install --immutable

      - name: Generate stats.json
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: yarn stats:ios

      - name: Upload stats.json
        uses: actions/upload-artifact@v4
        with:
          name: base-stats
          path: ./apps/app/stats.json

  # run the action against the stats.json files
  compare:
    name: 'Compare base & head bundle sizes'
    runs-on: ubuntu-24.04
    needs: [build-ios-base, build-ios-head]
    steps:
      - uses: actions/download-artifact@v4.1.7

      - uses: github/webpack-bundlesize-compare-action@v1.7.0
        with:
          title: 'ios bundle diff'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          current-stats-json-path: ./head-stats/stats.json
          base-stats-json-path: ./base-stats/stats.json
