name: release-desktop-all

# Unified desktop release pipeline:
#   1. Build renderer once on ubuntu (fastest)
#   2. Fan out to 3 platform jobs (mac, win, linux) — each packages multiple variants
#
# Triggered by daily-build / daily-build-dev dispatching an immutable CI tag,
# or manually via workflow_dispatch.
# This is the single source of truth for all desktop packaging.

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Build number from upstream CI (e.g. daily-build). Defaults to 1 if not provided."
        required: false
        type: string
        default: ''
      build_bundle_version:
        description: "Bundle version from upstream CI. Auto-generated if not provided."
        required: false
        type: string
        default: ''
      source_ref_name:
        description: "Original source ref name to use for build metadata when running from a temporary CI tag."
        required: false
        type: string
        default: ''
      ONEKEY_ALLOW_SKIP_GPG_VERIFICATION:
        description: "Allow skipping GPG verification for bundle updates (default: false)"
        required: false
        type: boolean
        default: false
      notify_release:
        description: "Notify Slack after packaging artifacts"
        required: false
        type: boolean
        default: false
      upload_mas_to_testflight:
        description: "Validate and upload MAS package to TestFlight"
        required: false
        type: boolean
        default: true
      upload_snap_to_store:
        description: "Upload Snap package to Snap Store edge"
        required: false
        type: boolean
        default: false
      cleanup_release_ref:
        description: "Delete the temporary CI release tag after completion"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  ONEKEY_ALLOW_SKIP_GPG_VERIFICATION: ${{ github.event.inputs.ONEKEY_ALLOW_SKIP_GPG_VERIFICATION || 'false' }}
  NOTIFY_RELEASE: ${{ github.event.inputs.notify_release || 'false' }}
  UPLOAD_MAS_TO_TESTFLIGHT: ${{ github.event.inputs.upload_mas_to_testflight || 'true' }}
  UPLOAD_SNAP_TO_STORE: ${{ github.event.inputs.upload_snap_to_store || 'false' }}
  SOURCE_REF_NAME: ${{ github.event.inputs.source_ref_name || github.ref_name }}

jobs:
  # ──────────────────────────────────────────────────
  # Stage 1: Build renderer once on ubuntu
  # ──────────────────────────────────────────────────
  renderer:
    uses: ./.github/workflows/build-desktop-renderer.yml
    with:
      build_number: ${{ github.event.inputs.build_number || '' }}
      build_bundle_version: ${{ github.event.inputs.build_bundle_version || '' }}
      source_ref_name: ${{ github.event.inputs.source_ref_name || github.ref_name }}
      ONEKEY_ALLOW_SKIP_GPG_VERIFICATION: ${{ github.event.inputs.ONEKEY_ALLOW_SKIP_GPG_VERIFICATION || 'false' }}
    secrets:
      COVALENT_KEY: ${{ secrets.COVALENT_KEY }}
      SENTRY_TOKEN: ${{ secrets.SENTRY_TOKEN }}
      SENTRY_DSN_REACT_NATIVE: ${{ secrets.SENTRY_DSN_REACT_NATIVE }}
      SENTRY_DSN_WEB: ${{ secrets.SENTRY_DSN_WEB }}
      SENTRY_DSN_DESKTOP: ${{ secrets.SENTRY_DSN_DESKTOP }}
      SENTRY_DSN_MAS: ${{ secrets.SENTRY_DSN_MAS }}
      SENTRY_DSN_SNAP: ${{ secrets.SENTRY_DSN_SNAP }}
      SENTRY_DSN_WINMS: ${{ secrets.SENTRY_DSN_WINMS }}
      SENTRY_DSN_EXT: ${{ secrets.SENTRY_DSN_EXT }}

  # ──────────────────────────────────────────────────
  # Stage 2: Platform-specific packaging (3 parallel jobs)
  # ──────────────────────────────────────────────────

  # ═══════════════════════════════════════════════════
  # macOS runner: Mac DMG + MAS
  # ═══════════════════════════════════════════════════
  package-mac:
    needs: renderer
    runs-on: macos-26
    strategy:
      matrix:
        node-version: [24.x]
    env:
      NODE_ENV: production
      YARN_ENABLE_GLOBAL_CACHE: true
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Run Shared Env Setup
        uses: ./.github/actions/shared-env
        with:
          env_file_name: '.env'
          source_ref_name: ${{ env.SOURCE_REF_NAME }}
          sentry_project: 'desktop'
          covalent_key: ${{ secrets.COVALENT_KEY }}
          sentry_token: ${{ secrets.SENTRY_TOKEN }}
          sentry_dsn_react_native: ${{ secrets.SENTRY_DSN_REACT_NATIVE }}
          sentry_dsn_web: ${{ secrets.SENTRY_DSN_WEB }}
          sentry_dsn_desktop: ${{ secrets.SENTRY_DSN_DESKTOP }}
          sentry_dsn_mas: ${{ secrets.SENTRY_DSN_MAS }}
          sentry_dsn_snap: ${{ secrets.SENTRY_DSN_SNAP }}
          sentry_dsn_winms: ${{ secrets.SENTRY_DSN_WINMS }}
          sentry_dsn_ext: ${{ secrets.SENTRY_DSN_EXT }}

      - name: Align version with renderer build
        run: |
          echo "BUILD_NUMBER=${{ needs.renderer.outputs.build_number }}" >> $GITHUB_ENV
          echo "BUILD_BUNDLE_VERSION=${{ needs.renderer.outputs.build_bundle_version }}" >> $GITHUB_ENV
          echo "BUILD_APP_VERSION=${{ needs.renderer.outputs.build_app_version }}" >> $GITHUB_ENV
          sed -i '' "s/^BUNDLE_VERSION=.*/BUNDLE_VERSION=${{ needs.renderer.outputs.build_bundle_version }}/" .env
          sed -i '' "s/^CI_BUILD_NUMBER=.*/CI_BUILD_NUMBER=${{ needs.renderer.outputs.build_number }}/" .env

      - name: Warn if GPG verification is skipped
        if: ${{ env.ONEKEY_ALLOW_SKIP_GPG_VERIFICATION == 'true' }}
        run: |
          echo "::warning::GPG verification is SKIPPED for this build. This should only be used in CI/dev builds."

      - name: 'Setup ENV'
        run: |
          eval "$(node -e 'const v=require("./apps/desktop/package.json").version; console.log("pkg_version="+v)')"
          echo "PKG_VERSION=$pkg_version" >> $GITHUB_ENV
          artifacts_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          echo "ARTIFACTS_URL=$artifacts_url" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@onekeyhq'

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=${{ github.workspace }}/.yarn" >> "$GITHUB_OUTPUT"

      - name: Install Dep
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max_old_space_size=8192'
        run: |
          yarn install --immutable

      - name: Download Renderer Artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-renderer-${{ github.sha }}
          path: ./apps/desktop/app/build/

      - name: Compile macOS Liquid Glass Icon
        run: |
          cd apps/desktop
          bash scripts/compile-liquid-icon.sh

      - name: Verify Liquid Glass Icon
        run: |
          cd apps/desktop
          bash scripts/verify-icon-compatibility.sh

      # ── Phase 1: Mac DMG (Developer ID) ──

      - name: Setup Developer ID Code Signing
        run: |
          echo ${{ secrets.DESKTOP_KEYS_SECRET }} | base64 -d > apps/desktop/sign.p12

      - name: Install Developer ID provisioning profile for CloudKit
        env:
          DESKTOP_ISO_PROVISION_PROFILE_BASE64: ${{ secrets.DESKTOP_ISO_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=./apps/desktop/OneKey_Desktop_DeveloperId.provisionprofile
          echo -n "$DESKTOP_ISO_PROVISION_PROFILE_BASE64" | base64 --decode > $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: 'Build Main Process'
        id: build_main
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
        run: |
          cd apps/desktop
          yarn build:main
          yarn install-app-deps

      - name: 'Package Mac'
        id: phase1_dmg
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
          APPLEID: ${{ secrets.APPLEID }}
          APPLEIDPASS: ${{ secrets.APPLEIDPASS }}
          ASC_PROVIDER: ${{ secrets.ASC_PROVIDER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: './sign.p12'
        run: |
          cd apps/desktop
          yarn build:electron:mac --publish never

      - name: Clean up Developer ID provisioning profile
        if: ${{ always() }}
        run: |
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/OneKey_Desktop_DeveloperId.provisionprofile

      - name: Upload Mac autoupdate metadata
        if: steps.phase1_dmg.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: onekey-desktop-mac-autoupdate-${{ env.BUILD_APP_VERSION }}-${{ env.BUILD_NUMBER }}-${{ env.BUILD_BUNDLE_VERSION }}-${{ github.sha }}
          path: |
            ./apps/desktop/build-electron/*.yml

      - name: Upload universal Mac DMG
        if: steps.phase1_dmg.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: onekey-desktop-mac-universal-dmg-${{ env.BUILD_APP_VERSION }}-${{ env.BUILD_NUMBER }}-${{ env.BUILD_BUNDLE_VERSION }}-${{ github.sha }}
          path: |
            ./apps/desktop/build-electron/*-universal.dmg

      - name: Upload x64 Mac DMG
        if: steps.phase1_dmg.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: onekey-desktop-mac-x64-dmg-${{ env.BUILD_APP_VERSION }}-${{ env.BUILD_NUMBER }}-${{ env.BUILD_BUNDLE_VERSION }}-${{ github.sha }}
          path: |
            ./apps/desktop/build-electron/*-x64.dmg

      - name: Upload arm64 Mac DMG
        if: steps.phase1_dmg.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: onekey-desktop-mac-arm64-dmg-${{ env.BUILD_APP_VERSION }}-${{ env.BUILD_NUMBER }}-${{ env.BUILD_BUNDLE_VERSION }}-${{ github.sha }}
          path: |
            ./apps/desktop/build-electron/*-arm64.dmg

      - name: Upload all Mac ZIPs
        if: steps.phase1_dmg.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: onekey-desktop-mac-zips-${{ env.BUILD_APP_VERSION }}-${{ env.BUILD_NUMBER }}-${{ env.BUILD_BUNDLE_VERSION }}-${{ github.sha }}
          path: |
            ./apps/desktop/build-electron/*.zip

      - name: 'Notify to Slack - Mac DMG'
        if: always() && env.NOTIFY_RELEASE == 'true' && steps.phase1_dmg.outcome == 'success'
        uses: onekeyhq/actions/slack-notify-webhook@86ad045e18da7958f659995ee2f9df375dd03ef4
        with:
          web-hook-url: ${{ secrets.SLACK_NOTIFICATION_WEBHOOK }}
          secret-key: ${{ secrets.ACTION_SIGN_SECERT_KEY }}
          artifact-type: Desktop
          artifact-name: OneKey-Desktop-RN
          artifact-bundle-id: 'so.onekey.wallet.desktop'
          artifact-version-name: '${{ env.BUILD_APP_VERSION }}@${{ env.BUILD_NUMBER }}'
          artifact-version-code: '${{ env.BUILD_NUMBER }}'
          artifact-download-url: '${{ env.ARTIFACTS_URL }}'
          artifact-skip-gpg: '${{ env.ONEKEY_ALLOW_SKIP_GPG_VERIFICATION }}'
          artifact-bundle-version: '${{ env.BUILD_BUNDLE_VERSION }}'

      # ── Phase 2: MAS (App Store signing) ──

      - name: Clean build-electron for MAS
        if: always() && steps.build_main.outcome == 'success'
        run: rm -rf apps/desktop/build-electron

      - name: Install the Apple certificate and provisioning profile for MAS
        if: always() && steps.build_main.outcome == 'success'
        env:
          MAC_INSTALL_P12_BASE64: ${{ secrets.MAC_INSTALL_P12_BASE64 }}
          MAC_INSTALL_P12_PASSWORD: ${{ secrets.MAC_INSTALL_P12_PASSWORD }}
          APPLE_DISTRIBUTION_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_P12_BASE64 }}
          APPLE_DISTRIBUTION_P12_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_P12_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          MAC_INSTALL_P12_PATH=$RUNNER_TEMP/mac_install_certificate.p12
          APPLE_DISTRIBUTION_P12_PATH=$RUNNER_TEMP/apple_distribution_certificate.p12
          PP_PATH=./apps/desktop/OneKey_Mac_App.provisionprofile
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$MAC_INSTALL_P12_BASE64" | base64 --decode > $MAC_INSTALL_P12_PATH
          echo -n "$APPLE_DISTRIBUTION_P12_BASE64" | base64 --decode > $APPLE_DISTRIBUTION_P12_PATH
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode > $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $MAC_INSTALL_P12_PATH -P "$MAC_INSTALL_P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security import $APPLE_DISTRIBUTION_P12_PATH -P "$APPLE_DISTRIBUTION_P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: 'Package MAS'
        id: phase2_mas
        if: always() && steps.build_main.outcome == 'success'
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
          APPLEID: ${{ secrets.APPLEID }}
          APPLEIDPASS: ${{ secrets.APPLEIDPASS }}
          ASC_PROVIDER: ${{ secrets.ASC_PROVIDER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd apps/desktop
          npx electron-builder build -m --config electron-builder-mas.config.js --publish never

      - name: Clean up MAS keychain and provisioning profile
        if: ${{ always() }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/OneKey_Mac_App.provisionprofile

      - name: Upload MAS Artifacts
        if: always() && steps.build_main.outcome == 'success' && steps.phase2_mas.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: onekey-desktop-mas-${{ env.BUILD_APP_VERSION }}-${{ env.BUILD_NUMBER }}-${{ env.BUILD_BUNDLE_VERSION }}-${{ github.sha }}
          path: |
            ./apps/desktop/build-electron/mas-universal/*.pkg

      - name: Validate MAS for Testflight
        if: always() && steps.build_main.outcome == 'success' && steps.phase2_mas.outcome == 'success' && env.UPLOAD_MAS_TO_TESTFLIGHT == 'true'
        env:
          APPLEID: ${{ secrets.APPLEID }}
          APPLEIDPASS: ${{ secrets.APPLEIDPASS }}
        run: |
          PKG_FILE=$(ls ./apps/desktop/build-electron/mas-universal/*.pkg)
          echo "Found package: $PKG_FILE"
          xcrun altool --validate-app --file "$PKG_FILE" -t macOS -u "$APPLEID" -p "$APPLEIDPASS" --show-progress

      - name: Upload MAS to Testflight
        if: always() && steps.build_main.outcome == 'success' && steps.phase2_mas.outcome == 'success' && env.UPLOAD_MAS_TO_TESTFLIGHT == 'true'
        continue-on-error: true
        env:
          APPLEID: ${{ secrets.APPLEID }}
          APPLEIDPASS: ${{ secrets.APPLEIDPASS }}
        run: |
          PKG_FILE=$(ls ./apps/desktop/build-electron/mas-universal/*.pkg)
          echo "Uploading package: $PKG_FILE"
          xcrun altool --upload-app --file "$PKG_FILE" -t macOS -u "$APPLEID" -p "$APPLEIDPASS" --show-progress

      - name: 'Notify to Slack - MAS'
        if: always() && env.NOTIFY_RELEASE == 'true' && steps.phase2_mas.outcome == 'success'
        uses: onekeyhq/actions/slack-notify-webhook@86ad045e18da7958f659995ee2f9df375dd03ef4
        with:
          web-hook-url: ${{ secrets.SLACK_NOTIFICATION_WEBHOOK }}
          secret-key: ${{ secrets.ACTION_SIGN_SECERT_KEY }}
          artifact-type: Desktop
          artifact-name: OneKey-Desktop-MAS
          artifact-bundle-id: 'so.onekey.wallet.desktop'
          artifact-version-name: '${{ env.BUILD_APP_VERSION }}@${{ env.BUILD_NUMBER }}'
          artifact-version-code: '${{ env.BUILD_NUMBER }}'
          artifact-download-url: '${{ env.ARTIFACTS_URL }}'
          artifact-skip-gpg: '${{ env.ONEKEY_ALLOW_SKIP_GPG_VERIFICATION }}'
          artifact-bundle-version: '${{ env.BUILD_BUNDLE_VERSION }}'

      - name: Fail if any phase failed
        if: always()
        shell: bash
        run: |
          [[ "${{ steps.phase1_dmg.outcome }}" == "failure" ]] && exit 1
          [[ "${{ steps.phase2_mas.outcome }}" == "failure" ]] && exit 1
          exit 0

  # ═══════════════════════════════════════════════════
  # Windows runner: Win NSIS + WinMS (Microsoft Store)
  # ═══════════════════════════════════════════════════
  package-win:
    needs: renderer
    # Pin to windows-2022 (VS 2022 / v17). The windows-2025 runner image now
    # ships Visual Studio 18, which the bundled node-gyp cannot detect
    # ("find VS unknown version undefined found at ...\Visual Studio\18"),
    # breaking every native module rebuild during `install-app-deps`.
    runs-on: windows-2022
    strategy:
      matrix:
        node-version: [24.x]
    env:
      NODE_ENV: production
      YARN_ENABLE_GLOBAL_CACHE: true
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Run Shared Env Setup
        uses: ./.github/actions/shared-env
        with:
          env_file_name: '.env'
          source_ref_name: ${{ env.SOURCE_REF_NAME }}
          sentry_project: 'desktop'
          covalent_key: ${{ secrets.COVALENT_KEY }}
          sentry_token: ${{ secrets.SENTRY_TOKEN }}
          sentry_dsn_react_native: ${{ secrets.SENTRY_DSN_REACT_NATIVE }}
          sentry_dsn_web: ${{ secrets.SENTRY_DSN_WEB }}
          sentry_dsn_desktop: ${{ secrets.SENTRY_DSN_DESKTOP }}
          sentry_dsn_mas: ${{ secrets.SENTRY_DSN_MAS }}
          sentry_dsn_snap: ${{ secrets.SENTRY_DSN_SNAP }}
          sentry_dsn_winms: ${{ secrets.SENTRY_DSN_WINMS }}
          sentry_dsn_ext: ${{ secrets.SENTRY_DSN_EXT }}

      - name: Align version with renderer build
        shell: pwsh
        run: |
          "BUILD_NUMBER=${{ needs.renderer.outputs.build_number }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BUILD_BUNDLE_VERSION=${{ needs.renderer.outputs.build_bundle_version }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BUILD_APP_VERSION=${{ needs.renderer.outputs.build_app_version }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          (Get-Content .env) -replace '^BUNDLE_VERSION=.*', "BUNDLE_VERSION=${{ needs.renderer.outputs.build_bundle_version }}" -replace '^CI_BUILD_NUMBER=.*', "CI_BUILD_NUMBER=${{ needs.renderer.outputs.build_number }}" | Set-Content .env

      - name: Warn if GPG verification is skipped
        if: ${{ env.ONEKEY_ALLOW_SKIP_GPG_VERIFICATION == 'true' }}
        run: |
          Write-Host "::warning::GPG verification is SKIPPED for this build. This should only be used in CI/dev builds."

      - name: 'Setup ENV'
        run: |
          $pkg_version = node -e "console.log(require('./apps/desktop/package.json').version)"
          $pkg_version = $pkg_version.Trim()
          Write-Host "pkg_version=$pkg_version"
          "PKG_VERSION=$pkg_version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $artifacts_url = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          "ARTIFACTS_URL=$artifacts_url" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Exclude workspace from Windows Defender
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath "${{ runner.temp }}"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@onekeyhq'

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        shell: pwsh
        run: echo "dir=${{ github.workspace }}/.yarn" >> "$GITHUB_OUTPUT"

      - name: Install Dep
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max_old_space_size=8192'
        run: |
          yarn install --immutable

      - name: Download Renderer Artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-renderer-${{ github.sha }}
          path: ./apps/desktop/app/build/

      - name: Setup Code Signing file
        run: |
          [IO.File]::WriteAllBytes("apps/desktop/sign.p12", [Convert]::FromBase64String("${{ secrets.DESKTOP_KEYS_SECRET }}"))

      # ── Phase 1: Windows NSIS installer ──

      - name: 'Build Main Process (win)'
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
        run: |
          cd apps/desktop
          yarn build:main
          yarn install-app-deps

      - name: 'Package Windows NSIS'
        id: phase1_nsis
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
          APPLEID: ${{ secrets.APPLEID }}
          APPLEIDPASS: ${{ secrets.APPLEIDPASS }}
          ASC_PROVIDER: ${{ secrets.ASC_PROVIDER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: './sign.p12'
        run: |
          cd apps/desktop
          npx electron-builder build -w --config electron-builder-win.config.js --publish never

      - name: Upload x64 Windows exe
        if: steps.phase1_nsis.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: onekey-desktop-win-x64-${{ env.BUILD_APP_VERSION }}-${{ env.BUILD_NUMBER }}-${{ env.BUILD_BUNDLE_VERSION }}-${{ github.sha }}
          path: |
            ./apps/desktop/build-electron/*-x64.exe

      - name: Upload arm64 Windows exe
        if: steps.phase1_nsis.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: onekey-desktop-win-arm64-${{ env.BUILD_APP_VERSION }}-${{ env.BUILD_NUMBER }}-${{ env.BUILD_BUNDLE_VERSION }}-${{ github.sha }}
          path: |
            ./apps/desktop/build-electron/*-arm64.exe

      - name: Upload universal Windows exe
        if: steps.phase1_nsis.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: onekey-desktop-win-universal-${{ env.BUILD_APP_VERSION }}-${{ env.BUILD_NUMBER }}-${{ env.BUILD_BUNDLE_VERSION }}-${{ github.sha }}
          path: |
            ./apps/desktop/build-electron/*.exe
            !./apps/desktop/build-electron/*-x64.exe
            !./apps/desktop/build-electron/*-arm64.exe

      - name: Upload Windows autoupdate metadata
        if: steps.phase1_nsis.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: onekey-desktop-win-autoupdate-${{ env.BUILD_APP_VERSION }}-${{ env.BUILD_NUMBER }}-${{ env.BUILD_BUNDLE_VERSION }}-${{ github.sha }}
          path: |
            ./apps/desktop/build-electron/*.yml

      - name: 'Notify to Slack - Win NSIS'
        if: always() && env.NOTIFY_RELEASE == 'true' && steps.phase1_nsis.outcome == 'success'
        uses: onekeyhq/actions/slack-notify-webhook@86ad045e18da7958f659995ee2f9df375dd03ef4
        with:
          web-hook-url: ${{ secrets.SLACK_NOTIFICATION_WEBHOOK }}
          secret-key: ${{ secrets.ACTION_SIGN_SECERT_KEY }}
          artifact-type: Desktop
          artifact-name: OneKey-Desktop-Win
          artifact-bundle-id: 'so.onekey.wallet.desktop'
          artifact-version-name: '${{ env.BUILD_APP_VERSION }}@${{ env.BUILD_NUMBER }}'
          artifact-version-code: '${{ env.BUILD_NUMBER }}'
          artifact-download-url: '${{ env.ARTIFACTS_URL }}'
          artifact-skip-gpg: '${{ env.ONEKEY_ALLOW_SKIP_GPG_VERIFICATION }}'
          artifact-bundle-version: '${{ env.BUILD_BUNDLE_VERSION }}'

      # ── Phase 2: Windows Microsoft Store ──

      - name: Clean build-electron for WinMS
        if: always()
        shell: pwsh
        run: Remove-Item -Recurse -Force apps/desktop/build-electron -ErrorAction SilentlyContinue

      - name: 'Rebuild Main Process (winms, DESK_CHANNEL=ms-store)'
        if: always()
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
          DESK_CHANNEL: ms-store
        run: |
          cd apps/desktop
          yarn build:main

      - name: 'Package Windows Microsoft Store'
        id: phase2_winms
        if: always()
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
          APPLEID: ${{ secrets.APPLEID }}
          APPLEIDPASS: ${{ secrets.APPLEIDPASS }}
          ASC_PROVIDER: ${{ secrets.ASC_PROVIDER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          DESK_CHANNEL: ms-store
          CSC_LINK: './sign.p12'
        run: |
          cd apps/desktop
          npx electron-builder build -w --config electron-builder-ms.config.js --publish never

      - name: Upload WinMS exe
        if: always() && steps.phase2_winms.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: onekey-desktop-winms-${{ env.BUILD_APP_VERSION }}-${{ env.BUILD_NUMBER }}-${{ env.BUILD_BUNDLE_VERSION }}-${{ github.sha }}
          path: |
            ./apps/desktop/build-electron/*.exe
            !./apps/desktop/build-electron/*-x64.exe
            !./apps/desktop/build-electron/*-arm64.exe

      - name: 'Notify to Slack - WinMS'
        if: always() && env.NOTIFY_RELEASE == 'true' && steps.phase2_winms.outcome == 'success'
        uses: onekeyhq/actions/slack-notify-webhook@86ad045e18da7958f659995ee2f9df375dd03ef4
        with:
          web-hook-url: ${{ secrets.SLACK_NOTIFICATION_WEBHOOK }}
          secret-key: ${{ secrets.ACTION_SIGN_SECERT_KEY }}
          artifact-type: Desktop
          artifact-name: OneKey-Desktop-Win-Store
          artifact-bundle-id: 'so.onekey.wallet.desktop'
          artifact-version-name: '${{ env.BUILD_APP_VERSION }}@${{ env.BUILD_NUMBER }}'
          artifact-version-code: '${{ env.BUILD_NUMBER }}'
          artifact-download-url: '${{ env.ARTIFACTS_URL }}'
          artifact-skip-gpg: '${{ env.ONEKEY_ALLOW_SKIP_GPG_VERIFICATION }}'
          artifact-bundle-version: '${{ env.BUILD_BUNDLE_VERSION }}'

      - name: Fail if any phase failed
        if: always()
        shell: bash
        run: |
          [[ "${{ steps.phase1_nsis.outcome }}" == "failure" ]] && exit 1
          [[ "${{ steps.phase2_winms.outcome }}" == "failure" ]] && exit 1
          exit 0

  # ═══════════════════════════════════════════════════
  # Linux runner: AppImage + Snap (amd64 + arm64)
  # ═══════════════════════════════════════════════════
  package-linux:
    needs: renderer
    strategy:
      matrix:
        node-version: [24.x]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runs-on: ubuntu-24.04
            build-flag: --x64
          - arch: arm64
            runs-on: ubuntu-24.04-arm
            build-flag: --arm64
    runs-on: ${{ matrix.runs-on }}
    env:
      NODE_ENV: production
      YARN_ENABLE_GLOBAL_CACHE: true
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Run Shared Env Setup
        uses: ./.github/actions/shared-env
        with:
          env_file_name: '.env'
          source_ref_name: ${{ env.SOURCE_REF_NAME }}
          sentry_project: 'desktop'
          covalent_key: ${{ secrets.COVALENT_KEY }}
          sentry_token: ${{ secrets.SENTRY_TOKEN }}
          sentry_dsn_react_native: ${{ secrets.SENTRY_DSN_REACT_NATIVE }}
          sentry_dsn_web: ${{ secrets.SENTRY_DSN_WEB }}
          sentry_dsn_desktop: ${{ secrets.SENTRY_DSN_DESKTOP }}
          sentry_dsn_mas: ${{ secrets.SENTRY_DSN_MAS }}
          sentry_dsn_snap: ${{ secrets.SENTRY_DSN_SNAP }}
          sentry_dsn_winms: ${{ secrets.SENTRY_DSN_WINMS }}
          sentry_dsn_ext: ${{ secrets.SENTRY_DSN_EXT }}

      - name: Align version with renderer build
        run: |
          echo "BUILD_NUMBER=${{ needs.renderer.outputs.build_number }}" >> $GITHUB_ENV
          echo "BUILD_BUNDLE_VERSION=${{ needs.renderer.outputs.build_bundle_version }}" >> $GITHUB_ENV
          echo "BUILD_APP_VERSION=${{ needs.renderer.outputs.build_app_version }}" >> $GITHUB_ENV
          sed -i "s/^BUNDLE_VERSION=.*/BUNDLE_VERSION=${{ needs.renderer.outputs.build_bundle_version }}/" .env
          sed -i "s/^CI_BUILD_NUMBER=.*/CI_BUILD_NUMBER=${{ needs.renderer.outputs.build_number }}/" .env

      - name: Warn if GPG verification is skipped
        if: ${{ env.ONEKEY_ALLOW_SKIP_GPG_VERIFICATION == 'true' }}
        run: |
          echo "::warning::GPG verification is SKIPPED for this build. This should only be used in CI/dev builds."

      - name: Install Snapcraft
        # Pin to the 8.x track. snapcraft 9.0.0 removed the `snap` subcommand
        # (renamed to `pack`), which electron-builder's app-builder still calls,
        # causing `exit status 64`. 8.x keeps `snap` and still supports the
        # core24 base used by this snap config.
        run: |
          sudo snap install snapcraft --classic --channel=8.x/stable \
            || sudo snap refresh snapcraft --classic --channel=8.x/stable

      - name: Install snap dependencies for snapcraft build
        run: |
          sudo snap install core24
          sudo snap install gnome-46-2404
          sudo snap install mesa-2404
          sudo snap install gtk-common-themes

      - name: Configure Snapcraft destructive mode
        run: |
          echo "SNAP_DESTRUCTIVE_MODE=true" >> $GITHUB_ENV

      - name: 'Setup ENV'
        run: |
          eval "$(node -e 'const v=require("./apps/desktop/package.json").version; console.log("pkg_version="+v)')"
          echo "PKG_VERSION=$pkg_version" >> $GITHUB_ENV
          artifacts_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          echo "ARTIFACTS_URL=$artifacts_url" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@onekeyhq'

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=${{ github.workspace }}/.yarn" >> "$GITHUB_OUTPUT"

      - name: Install Dep
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max_old_space_size=8192'
        run: |
          yarn install --immutable

      - name: Download Renderer Artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-renderer-${{ github.sha }}
          path: ./apps/desktop/app/build/

      # ── Phase 1: AppImage ──

      - name: 'Build Main Process (AppImage)'
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
          # Baked into the bundle via esbuild `define` in scripts/build.js.
          # Lets the main process tell at runtime that it's the AppImage build
          # without relying on the ambiguous runtime `APPIMAGE` env var.
          DESK_CHANNEL: appImage
        run: |
          cd apps/desktop
          yarn build:main
          yarn install-app-deps

      - name: 'Package AppImage'
        id: phase1_appimage
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd apps/desktop
          npx electron-builder build -l --config electron-builder.config.js ${{ matrix.build-flag }} --publish never

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: onekey-desktop-linux-appimage-${{ matrix.arch }}-${{ env.BUILD_APP_VERSION }}-${{ env.BUILD_NUMBER }}-${{ env.BUILD_BUNDLE_VERSION }}-${{ github.sha }}
          path: |
            ./apps/desktop/build-electron/*.AppImage

      - name: Upload Linux autoupdate metadata
        uses: actions/upload-artifact@v4
        with:
          name: onekey-desktop-linux-autoupdate-${{ matrix.arch }}-${{ env.BUILD_APP_VERSION }}-${{ env.BUILD_NUMBER }}-${{ env.BUILD_BUNDLE_VERSION }}-${{ github.sha }}
          path: |
            ./apps/desktop/build-electron/*.yml

      - name: 'Notify to Slack - Linux AppImage'
        if: always() && env.NOTIFY_RELEASE == 'true' && steps.phase1_appimage.outcome == 'success' && matrix.arch == 'amd64'
        uses: onekeyhq/actions/slack-notify-webhook@86ad045e18da7958f659995ee2f9df375dd03ef4
        with:
          web-hook-url: ${{ secrets.SLACK_NOTIFICATION_WEBHOOK }}
          secret-key: ${{ secrets.ACTION_SIGN_SECERT_KEY }}
          artifact-type: Desktop
          artifact-name: OneKey-Desktop-Linux-AppImage
          artifact-bundle-id: 'so.onekey.wallet.desktop'
          artifact-version-name: '${{ env.BUILD_APP_VERSION }}@${{ env.BUILD_NUMBER }}'
          artifact-version-code: '${{ env.BUILD_NUMBER }}'
          artifact-download-url: '${{ env.ARTIFACTS_URL }}'
          artifact-skip-gpg: '${{ env.ONEKEY_ALLOW_SKIP_GPG_VERIFICATION }}'
          artifact-bundle-version: '${{ env.BUILD_BUNDLE_VERSION }}'

      # ── Phase 2: Snap ──

      - name: Clean build-electron for Snap
        if: always()
        run: rm -rf apps/desktop/build-electron

      - name: 'Rebuild Main Process (Snap, SNAP=true)'
        if: always()
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
          SNAP: true
        run: |
          cd apps/desktop
          yarn build:main

      - name: 'Package Snap'
        id: phase2_snap
        if: always()
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SNAP: true
        run: |
          cd apps/desktop
          npx electron-builder build -l --config electron-builder-snap.config.js ${{ matrix.build-flag }} --publish never

      - name: Upload Snap
        if: always() && steps.phase2_snap.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: onekey-desktop-snap-${{ matrix.arch }}-${{ env.BUILD_APP_VERSION }}-${{ env.BUILD_NUMBER }}-${{ env.BUILD_BUNDLE_VERSION }}-${{ github.sha }}
          path: |
            ./apps/desktop/build-electron/*.snap

      - name: Upload Snap to Snap Store
        if: always() && steps.phase2_snap.outcome == 'success' && env.UPLOAD_SNAP_TO_STORE == 'true'
        continue-on-error: true
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
        run: |
          snapcraft push ./apps/desktop/build-electron/*.snap --release edge

      - name: 'Notify to Slack - Linux Snap'
        if: always() && env.NOTIFY_RELEASE == 'true' && steps.phase2_snap.outcome == 'success' && matrix.arch == 'amd64'
        uses: onekeyhq/actions/slack-notify-webhook@86ad045e18da7958f659995ee2f9df375dd03ef4
        with:
          web-hook-url: ${{ secrets.SLACK_NOTIFICATION_WEBHOOK }}
          secret-key: ${{ secrets.ACTION_SIGN_SECERT_KEY }}
          artifact-type: Desktop
          artifact-name: OneKey-Desktop-Linux-Snap
          artifact-bundle-id: 'so.onekey.wallet.desktop'
          artifact-version-name: '${{ env.BUILD_APP_VERSION }}@${{ env.BUILD_NUMBER }}'
          artifact-version-code: '${{ env.BUILD_NUMBER }}'
          artifact-download-url: '${{ env.ARTIFACTS_URL }}'
          artifact-skip-gpg: '${{ env.ONEKEY_ALLOW_SKIP_GPG_VERIFICATION }}'
          artifact-bundle-version: '${{ env.BUILD_BUNDLE_VERSION }}'

      - name: Fail if any phase failed
        if: always()
        shell: bash
        run: |
          [[ "${{ steps.phase1_appimage.outcome }}" == "failure" ]] && exit 1
          [[ "${{ steps.phase2_snap.outcome }}" == "failure" ]] && exit 1
          exit 0

  cleanup-release-ref:
    if: ${{ always() && github.event.inputs.cleanup_release_ref == 'true' && startsWith(github.ref, 'refs/tags/ci/desktop-release/') }}
    needs:
      - renderer
      - package-mac
      - package-win
      - package-linux
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Delete temporary CI release tag
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_REF_NAME}"
